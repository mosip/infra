name: Destroy Testrigs using Helmsman

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: "Type 'destroy' to confirm destruction of testrigs"
        required: true
        type: string
      namespace_selection:
        description: "Namespace selection"
        required: true
        type: choice
        default: "all"
        options:
          - all
          - specific
      specific_namespaces:
        description: "Specific namespaces (comma-separated, e.g., apitestrig,uitestrig,dslrig). Only used if 'specific' is selected above."
        required: false
        type: string

jobs:
  validate-confirmation:
    runs-on: ubuntu-latest
    steps:
      - name: Validate destruction confirmation
        run: |
          if [ "${{ github.event.inputs.confirmation }}" != "destroy" ]; then
            echo "❌ Destruction cancelled. You must type 'destroy' to confirm."
            exit 1
          fi
          echo "✅ Destruction confirmed. Proceeding..."

  destroy:
    runs-on: ubuntu-latest
    needs: validate-confirmation
    environment: 
      name: ${{ github.ref_name }}
    env:
      KUBECONFIG: ${{ github.workspace }}/.kube/config
      PATH: ${{ github.workspace }}/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      KUBECTL_PATH: ${{ github.workspace }}/.local/bin/kubectl
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Setup kubectl and kubeconfig
        env:
          KUBECONFIG_CONTENT: ${{ secrets.KUBECONFIG }}
        run: |
          # Create directories
          mkdir -p ${{ github.workspace }}/.local/bin
          mkdir -p ${{ github.workspace }}/.kube
          
          # Install kubectl
          curl -LO https://dl.k8s.io/release/v1.31.3/bin/linux/amd64/kubectl
          chmod +x kubectl
          mv ./kubectl ${{ github.workspace }}/.local/bin/kubectl
          
          # Setup kubeconfig
          echo "$KUBECONFIG_CONTENT" > ${{ github.workspace }}/.kube/config
          chmod 400 ${{ github.workspace }}/.kube/config
          
          # Add kubectl to GitHub PATH for subsequent steps
          echo "${{ github.workspace }}/.local/bin" >> $GITHUB_PATH
          
          # Export environment variables for immediate use
          echo "KUBECTL_PATH=${{ github.workspace }}/.local/bin/kubectl" >> $GITHUB_ENV
          
          # Verify installation
          ${{ github.workspace }}/.local/bin/kubectl version --client
          ${{ github.workspace }}/.local/bin/kubectl config view

      - name: Setup ufw firewall
        run: |
          sudo ufw enable
          sudo ufw allow ssh
          sudo ufw allow 51820/udp
          sudo ufw status  

      - name: Install WireGuard
        run: sudo apt-get install -y wireguard

      - name: Configure WireGuard
        run: |
          echo "${{ secrets.CLUSTER_WIREGUARD_WG0 }}" | sudo tee /etc/wireguard/wg0.conf

      - name: Start WireGuard
        run: |
          sudo chmod 600 /etc/wireguard/wg0.conf
          sudo chmod 700 /etc/wireguard/
          sudo chmod 644 /lib/systemd/system/wg-quick@.service
          sudo systemctl daemon-reload
          sudo wg-quick up wg0
          sudo wg show wg0

      - name: Setup Helm
        run: |
          curl -fsSL -o get_helm.sh https://raw.githubusercontent.com/helm/helm/master/scripts/get-helm-3
          sudo chmod 700 get_helm.sh
          sudo ./get_helm.sh
          helm version --client

      - name: Install Helmsman
        run: |
          curl -L https://github.com/Praqma/helmsman/releases/download/v3.17.1/helmsman_3.17.1_linux_amd64.tar.gz -o helmsman.tar.gz
          tar xzf helmsman.tar.gz
          sudo mv helmsman /usr/local/bin
          
          # Verify all tools are available
          echo "All tools verification:"
          echo "kubectl: $(which kubectl)"
          echo "helmsman: $(which helmsman)"
          
          kubectl version --client
          helmsman -v

      - name: Verify cluster access
        run: |
          # Verify tools are accessible
          echo "Verifying tool availability:"
          echo "kubectl path: $(which kubectl)"
          echo "KUBECONFIG: $KUBECONFIG"
          
          # Test kubectl functionality
          kubectl version --client
          kubectl get nodes
          kubectl cluster-info

      - name: Destroy Testrigs using Helmsman
        run: |          
          export HOME="${{ github.workspace }}"
          export WORKDIR="$HOME/Helmsman"
          
          # Verify tools are available
          echo "Using kubectl: $(which kubectl)"
          echo "Using kubeconfig: $KUBECONFIG"
          
          echo "🗑️  Step 1: Uninstalling Helm releases..."
          
          if [ "${{ github.event.inputs.namespace_selection }}" == "specific" ]; then
            echo "Uninstalling Helm releases from specific namespaces..."
            IFS=',' read -ra NAMESPACES <<< "${{ github.event.inputs.specific_namespaces }}"
            for NS in "${NAMESPACES[@]}"; do
              NS=$(echo "$NS" | xargs)  # Trim whitespace
              echo "Processing namespace: $NS"
              # Get all helm releases in this namespace and uninstall them
              RELEASES=$(helm list -n "$NS" -q 2>/dev/null || true)
              if [ -n "$RELEASES" ]; then
                echo "Found releases in $NS: $RELEASES"
                for RELEASE in $RELEASES; do
                  echo "Uninstalling release: $RELEASE from namespace: $NS"
                  helm uninstall "$RELEASE" -n "$NS" || true
                done
              else
                echo "No Helm releases found in namespace: $NS"
              fi
            done
          else
            echo "Uninstalling all Helm releases using Helmsman..."
            helmsman --destroy -f $WORKDIR/dsf/testrigs-dsf.yaml
          fi
          
          echo ""
          echo "🗑️  Step 2: Deleting namespaces..."
          
          if [ "${{ github.event.inputs.namespace_selection }}" == "specific" ]; then
            echo "Deleting specific testrig namespaces..."
            IFS=',' read -ra NAMESPACES <<< "${{ github.event.inputs.specific_namespaces }}"
            for NS in "${NAMESPACES[@]}"; do
              NS=$(echo "$NS" | xargs)  # Trim whitespace
              echo "Deleting namespace: $NS"
              kubectl delete namespace "$NS" --ignore-not-found=true --timeout=5m
            done
          else
            echo "Deleting all testrig namespaces..."
            TESTRIG_NAMESPACES=(
              apitestrig
              dslrig
              uitestrig
            )
            for NS in "${TESTRIG_NAMESPACES[@]}"; do
              echo "Deleting namespace: $NS"
              kubectl delete namespace "$NS" --ignore-not-found=true --timeout=5m
            done
          fi

      - name: Verify Testrig Resource Cleanup
        run: |
          echo "Verifying testrig resource cleanup..."
          
          # Determine which namespaces to check
          if [ "${{ github.event.inputs.namespace_selection }}" == "specific" ]; then
            echo "Checking specific namespaces..."
            IFS=',' read -ra TESTRIG_NAMESPACES <<< "${{ github.event.inputs.specific_namespaces }}"
          else
            # List of all testrig namespaces
            TESTRIG_NAMESPACES=(
              apitestrig
              dslrig
              uitestrig
            )
          fi
          
          # Check if namespaces still exist
          for NS in "${TESTRIG_NAMESPACES[@]}"; do
            NS=$(echo "$NS" | xargs)  # Trim whitespace
            if kubectl get namespace "$NS" >/dev/null 2>&1; then
              echo "⚠️  Namespace $NS still exists"
              POD_COUNT=$(kubectl get pods -n "$NS" --no-headers 2>/dev/null | wc -l)
              JOB_COUNT=$(kubectl get jobs -n "$NS" --no-headers 2>/dev/null | wc -l)
              echo "    Pods remaining: $POD_COUNT"
              echo "    Jobs remaining: $JOB_COUNT"
            else
              echo "✅ Namespace $NS successfully removed"
            fi
          done

      - name: Remove Testrigs DSF Label
        run: |
          kubectl label namespace default testrigs-dsf- --overwrite || true
          echo "✅ Testrigs DSF label removed from default namespace"

      - name: Check for Testrig Jobs and Pods
        run: |
          echo "Checking for remaining testrig jobs and pods..."
          
          for NS in apitestrig dslrig uitestrig; do
            if kubectl get namespace "$NS" >/dev/null 2>&1; then
              echo ""
              echo "Namespace: $NS"
              echo "Jobs:"
              kubectl get jobs -n "$NS" 2>/dev/null || echo "  No jobs found"
              echo "Pods:"
              kubectl get pods -n "$NS" 2>/dev/null || echo "  No pods found"
            fi
          done
