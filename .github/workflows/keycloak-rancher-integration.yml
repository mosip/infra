name: Keycloak-Rancher SAML Integration

on:
  workflow_dispatch:
    inputs:
      # Keycloak Configuration (Required)
      keycloak_host:
        description: 'Keycloak Host URL (e.g., https://keycloak.example.com)'
        required: true
        type: string
      keycloak_realm:
        description: 'Keycloak Realm'
        required: false
        type: string
        default: 'master'
      keycloak_admin_user:
        description: 'Keycloak Admin Username'
        required: true
        type: string
      # keycloak_admin_password input removed; use secrets instead
      
      # Rancher Configuration (Required)
      rancher_host:
        description: 'Rancher Host URL (e.g., https://rancher.example.com)'
        required: true
        type: string
      # rancher_token input removed; use secrets instead
      
      # Optional Configuration
      keycloak_admin_email:
        description: 'Keycloak Admin Email (default: admin@example.com)'
        required: false
        type: string
        default: 'admin@example.com'
      
      ssl_cert_subject:
        description: 'SSL Certificate Subject (default: /C=US/ST=State/L=City/O=Organization/CN=rancher)'
        required: false
        type: string
        default: '/C=US/ST=State/L=City/O=Organization/CN=rancher'
      
      saml_access_mode:
        description: 'SAML Access Mode (default: unrestricted)'
        required: false
        type: string
        default: 'unrestricted'
      
      force_recreate:
        description: 'Force recreate everything (delete existing configurations)'
        required: false
        type: boolean
        default: false

jobs:
  setup-integration:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      
      - name: Install dependencies
        run: |
          pip install requests python-dotenv

      - name: Install WireGuard
        run: sudo apt-get update && sudo apt-get install -y wireguard

      - name: Configure WireGuard
        run: |
          # Check if WireGuard config secret is available
          if [ -z "${{ secrets.TF_WG_CONFIG }}" ]; then
            echo "❌ ERROR: TF_WG_CONFIG secret is not configured"
            echo "Please configure the WireGuard configuration secret for this workflow"
            exit 1
          fi
          
          # Debug: Check if secret is available (without exposing content)
          echo "🔍 Checking TF_WG_CONFIG secret..."
          if [ ${#TF_WG_CONFIG} -eq 0 ]; then
            echo "❌ ERROR: TF_WG_CONFIG environment variable is empty"
            exit 1
          fi
          echo "✅ Secret length: ${#TF_WG_CONFIG} characters"
          
          # Create config file with proper handling of multiline content
          echo "Creating /etc/wireguard directory with proper permissions..."
          sudo mkdir -p /etc/wireguard
          sudo chmod 755 /etc/wireguard
          sudo chown root:root /etc/wireguard
          
          # Debug: Check secret format without exposing sensitive data
          echo "Secret contains '[Interface]': $(printf '%s' "$TF_WG_CONFIG" | grep -c '\[Interface\]')"
          echo "Secret contains '[Peer]': $(printf '%s' "$TF_WG_CONFIG" | grep -c '\[Peer\]')"
          
          # Write to temp file with explicit newline handling
          printf '%s' "$TF_WG_CONFIG" > /tmp/wg0.conf.tmp
          
          # Check temp file was created successfully
          if [ ! -f /tmp/wg0.conf.tmp ]; then
            echo "❌ ERROR: Failed to create temporary config file"
            exit 1
          fi
          
          echo "Temp file size: $(wc -c < /tmp/wg0.conf.tmp) bytes"
          echo "Temp file lines: $(wc -l < /tmp/wg0.conf.tmp)"
          
          # Write config directly with sudo
          echo "Writing config directly with sudo..."
          sudo tee /etc/wireguard/wg0.conf < /tmp/wg0.conf.tmp > /dev/null
          
          # Clean up temp file
          rm -f /tmp/wg0.conf.tmp
          
          # Verify the file was created and check its size
          if sudo test -f /etc/wireguard/wg0.conf; then
            echo "✅ Config file created successfully"
            echo "Final config file size: $(sudo wc -c /etc/wireguard/wg0.conf) bytes"
          else
            echo "❌ ERROR: Config file doesn't exist"
            exit 1
          fi
          
          # Set proper permissions
          sudo chmod 600 /etc/wireguard/wg0.conf
          sudo chown root:root /etc/wireguard/wg0.conf
          
          echo "Final file permissions: $(sudo ls -la /etc/wireguard/wg0.conf)"
          
          # Verify config file is not empty and has expected content
          if ! sudo test -s /etc/wireguard/wg0.conf; then
            echo "❌ ERROR: WireGuard config file is empty after writing!"
            exit 1
          fi
          
          # Basic validation that it looks like a WireGuard config
          if ! sudo grep -q "\[Interface\]" /etc/wireguard/wg0.conf; then
            echo "❌ ERROR: WireGuard config doesn't contain [Interface] section"
            exit 1
          fi
          
          echo "✅ WireGuard configuration applied successfully"
        env:
          TF_WG_CONFIG: ${{ secrets.TF_WG_CONFIG }}

      - name: Start WireGuard
        run: |
          sudo chmod 600 /etc/wireguard/wg0.conf
          sudo chmod 700 /etc/wireguard/
          sudo systemctl daemon-reload
          echo "Starting WireGuard..."
          if ! sudo wg-quick up wg0; then
            echo "❌ ERROR: Failed to start WireGuard VPN"
            echo "Check the WireGuard configuration file at /etc/wireguard/wg0.conf for errors."
            # Do NOT print config contents to avoid exposing private keys
            exit 1
          fi
          echo "✅ WireGuard started successfully"
          sudo wg show wg0

      - name: Run Keycloak-Rancher SAML Integration
        env:
          # Keycloak Configuration
          KEYCLOAK_HOST: ${{ inputs.keycloak_host }}
          KEYCLOAK_REALM: ${{ inputs.keycloak_realm }}
          KEYCLOAK_ADMIN_USER: ${{ inputs.keycloak_admin_user }}
          KEYCLOAK_ADMIN_PASSWORD: ${{ secrets.KEYCLOAK_ADMIN_PASSWORD }}
          KEYCLOAK_ADMIN_EMAIL: ${{ inputs.keycloak_admin_email }}
          KEYCLOAK_ADMIN_FIRSTNAME: 'Admin'

          # Rancher Configuration
          RANCHER_HOST: ${{ inputs.rancher_host }}
          RANCHER_TOKEN: ${{ secrets.RANCHER_TOKEN }}

          # SSL Configuration (using defaults)
          SSL_CERT_SUBJECT: ${{ inputs.ssl_cert_subject }}
          SSL_CERT_DAYS: '1825'
          SSL_KEY_SIZE: '2048'
          SSL_KEY_FILE: 'myservice.key'
          SSL_CERT_FILE: 'myservice.cert'

          # SAML Configuration (using defaults)
          SAML_DESCRIPTOR_FILE: 'keycloak-saml-descriptor.xml'
          SAML_DISPLAY_NAME_FIELD: 'givenName'
          SAML_USERNAME_FIELD: 'email'
          SAML_UID_FIELD: 'username'
          SAML_GROUPS_FIELD: 'member'
          SAML_ACCESS_MODE: ${{ inputs.saml_access_mode }}

          # Force Recreate Option
          FORCE_RECREATE: ${{ inputs.force_recreate }}
        run: |
          python3 Rancher-keycloak-integration/automation_script.py
      
      - name: Run Rancher Diagnostics (Optional)
        if: failure()
        env:
          RANCHER_HOST: ${{ inputs.rancher_host }}
          RANCHER_TOKEN: ${{ secrets.RANCHER_TOKEN }}
        run: |
          python3 Rancher-keycloak-integration/rancher_diagnostic.py
