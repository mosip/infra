name: Cleanup Partner Data

on:
  workflow_dispatch:
    inputs:
      db_host:
        description: 'Database host'
        required: true
        default: 'postgres'
      db_port:
        description: 'Database port'
        required: true
        default: '5432'
      db_user:
        description: 'Database user'
        required: true
        default: 'postgres'
      dry_run:
        description: 'Dry run (true/false)'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      confirm_deletion:
        description: 'Type DELETE to confirm deletion (required when dry_run=false)'
        required: false
        default: ''
      enable_wireguard:
        description: 'Enable Wireguard VPN'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  cleanup-partner-data:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref_name }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Wireguard
        if: ${{ github.event.inputs.enable_wireguard == 'true' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y wireguard resolvconf
          echo "${{ secrets.CLUSTER_WIREGUARD_WG0 }}" | sudo tee /etc/wireguard/wg0.conf > /dev/null
          sudo chmod 600 /etc/wireguard/wg0.conf
          sudo wg-quick up wg0
          echo "Wireguard VPN connected"

      - name: Validate confirmation
        if: ${{ github.event.inputs.dry_run == 'false' }}
        env:
          CONFIRM: ${{ github.event.inputs.confirm_deletion }}
        run: |
          if [ "$CONFIRM" != "DELETE" ]; then
            echo "ERROR: You must type 'DELETE' in the confirmation field to proceed with deletion"
            exit 1
          fi

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Make script executable
        run: chmod +x Helmsman/hooks/cleanup-partner-data.sh

      - name: Run cleanup script (dry-run)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_HOST: ${{ github.event.inputs.db_host }}
          DB_PORT: ${{ github.event.inputs.db_port }}
          DB_USER: ${{ github.event.inputs.db_user }}
        run: |
          cd Helmsman/hooks
          ./cleanup-partner-data.sh \
            --host "$DB_HOST" \
            --port "$DB_PORT" \
            --user "$DB_USER" \
            --dry-run

      - name: Run cleanup script (execute deletions)
        if: ${{ github.event.inputs.dry_run == 'false' }}
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_HOST: ${{ github.event.inputs.db_host }}
          DB_PORT: ${{ github.event.inputs.db_port }}
          DB_USER: ${{ github.event.inputs.db_user }}
        run: |
          cd Helmsman/hooks
          ./cleanup-partner-data.sh \
            --host "$DB_HOST" \
            --port "$DB_PORT" \
            --user "$DB_USER"

      - name: Disconnect Wireguard
        if: ${{ always() && github.event.inputs.enable_wireguard == 'true' }}
        run: |
          sudo wg-quick down wg0 || true
          echo "Wireguard VPN disconnected"

      - name: Summary
        if: success()
        env:
          DB_HOST: ${{ github.event.inputs.db_host }}
          DB_PORT: ${{ github.event.inputs.db_port }}
          DB_USER: ${{ github.event.inputs.db_user }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          echo "## Cleanup Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Database Host:** $DB_HOST" >> $GITHUB_STEP_SUMMARY
          echo "- **Database Port:** $DB_PORT" >> $GITHUB_STEP_SUMMARY
          echo "- **Database User:** $DB_USER" >> $GITHUB_STEP_SUMMARY
          echo "- **Dry Run:** $DRY_RUN" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$DRY_RUN" == "true" ]; then
            echo "✅ Dry run completed - no data was deleted" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Deletion executed - partner data has been removed" >> $GITHUB_STEP_SUMMARY
          fi
