name: Destroy MOSIP services using Helmsman

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: "Type 'destroy' to confirm destruction of MOSIP services"
        required: true
        type: string

jobs:
  validate-confirmation:
    runs-on: ubuntu-latest
    steps:
      - name: Validate destruction confirmation
        run: |
          if [ "${{ github.event.inputs.confirmation }}" != "destroy" ]; then
            echo "❌ Destruction cancelled. You must type 'destroy' to confirm."
            exit 1
          fi
          echo "✅ Destruction confirmed. Proceeding..."

  destroy:
    runs-on: ubuntu-latest
    needs: validate-confirmation
    environment: 
      name: ${{ github.ref_name }}
    env:
      KUBECONFIG: ${{ github.workspace }}/.kube/config
      PATH: ${{ github.workspace }}/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      KUBECTL_PATH: ${{ github.workspace }}/.local/bin/kubectl
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Setup kubectl and kubeconfig
        env:
          KUBECONFIG_CONTENT: ${{ secrets.KUBECONFIG }}
        run: |
          # Create directories
          mkdir -p ${{ github.workspace }}/.local/bin
          mkdir -p ${{ github.workspace }}/.kube
          
          # Install kubectl
          curl -LO https://dl.k8s.io/release/v1.31.3/bin/linux/amd64/kubectl
          chmod +x kubectl
          mv ./kubectl ${{ github.workspace }}/.local/bin/kubectl
          
          # Setup kubeconfig
          echo "$KUBECONFIG_CONTENT" > ${{ github.workspace }}/.kube/config
          chmod 400 ${{ github.workspace }}/.kube/config
          
          # Add kubectl to GitHub PATH for subsequent steps
          echo "${{ github.workspace }}/.local/bin" >> $GITHUB_PATH
          
          # Export environment variables for immediate use
          echo "KUBECTL_PATH=${{ github.workspace }}/.local/bin/kubectl" >> $GITHUB_ENV
          
          # Verify installation
          ${{ github.workspace }}/.local/bin/kubectl version --client
          ${{ github.workspace }}/.local/bin/kubectl config view

      - name: Setup ufw firewall
        run: |
          sudo ufw enable
          sudo ufw allow ssh
          sudo ufw allow 51820/udp
          sudo ufw status  

      - name: Install WireGuard
        run: sudo apt-get install -y wireguard

      - name: Configure WireGuard
        run: |
          echo "${{ secrets.CLUSTER_WIREGUARD_WG0 }}" | sudo tee /etc/wireguard/wg0.conf

      - name: Start WireGuard
        run: |
          sudo chmod 600 /etc/wireguard/wg0.conf
          sudo chmod 700 /etc/wireguard/
          sudo chmod 644 /lib/systemd/system/wg-quick@.service
          sudo systemctl daemon-reload
          sudo wg-quick up wg0
          sudo wg show wg0

      - name: Setup Helm
        run: |
          curl -fsSL -o get_helm.sh https://raw.githubusercontent.com/helm/helm/master/scripts/get-helm-3
          sudo chmod 700 get_helm.sh
          sudo ./get_helm.sh
          helm version --client

      - name: Install Helmsman
        run: |
          curl -L https://github.com/Praqma/helmsman/releases/download/v3.17.1/helmsman_3.17.1_linux_amd64.tar.gz -o helmsman.tar.gz
          tar xzf helmsman.tar.gz
          sudo mv helmsman /usr/local/bin
          
          # Verify all tools are available
          echo "All tools verification:"
          echo "kubectl: $(which kubectl)"
          echo "helmsman: $(which helmsman)"
          
          kubectl version --client
          helmsman -v

      - name: Verify cluster access
        run: |
          # Verify tools are accessible
          echo "Verifying tool availability:"
          echo "kubectl path: $(which kubectl)"
          echo "KUBECONFIG: $KUBECONFIG"
          
          # Test kubectl functionality
          kubectl version --client
          kubectl get nodes
          kubectl cluster-info

      - name: Destroy MOSIP Services using Helmsman
        run: |          
          export HOME="${{ github.workspace }}"
          export WORKDIR="$HOME/Helmsman"
          
          # Verify tools are available
          echo "Using kubectl: $(which kubectl)"
          echo "Using kubeconfig: $KUBECONFIG"
          
          echo "🗑️  Destroying MOSIP services..."
          # Run helmsman with destroy flag
          helmsman --destroy -f $WORKDIR/dsf/mosip-dsf.yaml

      - name: Verify MOSIP Resource Cleanup
        run: |
          echo "Verifying MOSIP resource cleanup..."
          
          # List of MOSIP namespaces
          MOSIP_NAMESPACES=(
            admin
            apitestrig
            artifactory
            config-server
            dslrig
            esignet
            idrepo
            kernel
            masterdata
            packet-manager
            pmp
            postgresdb
            print
            regproc
            resident
            uitestrig
          )
          
          # Check if namespaces still exist
          for NS in "${MOSIP_NAMESPACES[@]}"; do
            if kubectl get namespace "$NS" >/dev/null 2>&1; then
              echo "⚠️  Namespace $NS still exists"
              POD_COUNT=$(kubectl get pods -n "$NS" --no-headers 2>/dev/null | wc -l)
              echo "    Pods remaining: $POD_COUNT"
            else
              echo "✅ Namespace $NS successfully removed"
            fi
          done

      - name: Remove MOSIP DSF Label
        run: |
          kubectl label namespace default mosip-dsf- --overwrite || true
          echo "✅ MOSIP DSF label removed from default namespace"

      - name: Check for PersistentVolumeClaims
        run: |
          echo "Checking for remaining PersistentVolumeClaims..."
          kubectl get pvc --all-namespaces | grep -E "(admin|apitestrig|artifactory|config-server|dslrig|esignet|idrepo|kernel|masterdata|packet-manager|pmp|postgresdb|print|regproc|resident|uitestrig)" || echo "No MOSIP PVCs found"

  cleanup-summary:
    runs-on: ubuntu-latest
    needs: destroy
    if: always()
    steps:
      - name: Destruction Summary
        run: |
          echo "=========================================="
          echo "🗑️  MOSIP Services Destruction Complete"
          echo "=========================================="
          echo ""
          echo "Destroyed components:"
          echo "  ✅ All MOSIP core services"
          echo "  ✅ MOSIP namespaces"
          echo ""
          echo "⚠️  Manual cleanup may be needed for:"
          echo "  - PersistentVolumeClaims (PVCs)"
          echo "  - PersistentVolumes (PVs)"
          echo "  - LoadBalancer services"
          echo ""
          echo "Commands for manual cleanup:"
          echo "  kubectl get pvc --all-namespaces"
          echo "  kubectl get pv"
          echo "  kubectl get svc --all-namespaces -o wide | grep LoadBalancer"
          echo "=========================================="
