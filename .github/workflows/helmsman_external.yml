name: Destroy Prerequisite services of MOSIP using Helm

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: "Type 'destroy' to confirm destruction of prerequisite services"
        required: true
        type: string
      namespace_selection:
        description: "Namespace selection"
        required: true
        type: choice
        default: "all"
        options:
          - all
          - specific
      specific_namespaces:
        description: "Specific namespaces (comma-separated, e.g., cattle-logging-system,istio-system). Only used if 'specific' is selected above."
        required: false
        type: string

jobs:
  validate-confirmation:
    runs-on: ubuntu-latest
    steps:
      - name: Validate destruction confirmation
        run: |
          if [ "${{ github.event.inputs.confirmation }}" != "destroy" ]; then
            echo "❌ Destruction cancelled. You must type 'destroy' to confirm."
            exit 1
          fi
          echo "✅ Destruction confirmed. Proceeding..."

  destroy:
    runs-on: ubuntu-latest
    needs: validate-confirmation
    environment:
      name: ${{ github.ref_name }}
    env:
      KUBECONFIG: ${{ github.workspace }}/.kube/config
      PATH: ${{ github.workspace }}/istio-1.22.0/bin:${{ github.workspace }}/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      ISTIOCTL_PATH: ${{ github.workspace }}/istio-1.22.0/bin/istioctl
      KUBECTL_PATH: ${{ github.workspace }}/.local/bin/kubectl
    steps:
      - name: Show target
        run: |
          echo "🗑️  Destroying prereq-dsf.yaml"
          echo "Using WireGuard config: wg0"
          pwd

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup kubectl, istioctl and kubeconfig
        env:
          KUBECONFIG_CONTENT: ${{ secrets.KUBECONFIG }}
        run: |
          mkdir -p ${{ github.workspace }}/.local/bin
          mkdir -p ${{ github.workspace }}/.kube
          
          # Install kubectl with checksum verification
          KUBECTL_VERSION="v1.31.3"
          KUBECTL_URL="https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          CHECKSUM_URL="https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl.sha256"
          
          # Download kubectl binary
          curl --fail -LO "${KUBECTL_URL}"
          
          # Download and verify checksum
          curl --fail -LO "${CHECKSUM_URL}"
          echo "$(cat kubectl.sha256)  kubectl" | sha256sum --check --status
          
          if [ $? -ne 0 ]; then
            echo "❌ Checksum verification failed for kubectl ${KUBECTL_VERSION}"
            rm -f kubectl kubectl.sha256
            exit 1
          fi
          
          echo "✅ Checksum verification passed for kubectl ${KUBECTL_VERSION}"
          
          # Install kubectl
          chmod +x kubectl
          mv ./kubectl ${{ github.workspace }}/.local/bin/kubectl
          
          # Clean up checksum file
          rm -f kubectl.sha256
          
          # Install istioctl
          curl -L https://istio.io/downloadIstio | ISTIO_VERSION=1.22.0 TARGET_ARCH=x86_64 sh -
          
          # Setup kubeconfig
          echo "$KUBECONFIG_CONTENT" > ${{ github.workspace }}/.kube/config
          chmod 400 ${{ github.workspace }}/.kube/config
          echo "${{ github.workspace }}/.local/bin" >> $GITHUB_PATH
          echo "${{ github.workspace }}/istio-1.22.0/bin" >> $GITHUB_PATH
          echo "KUBECTL_PATH=${{ github.workspace }}/.local/bin/kubectl" >> $GITHUB_ENV
          echo "ISTIOCTL_PATH=${{ github.workspace }}/istio-1.22.0/bin/istioctl" >> $GITHUB_ENV
          ${{ github.workspace }}/.local/bin/kubectl version --client
          ${{ github.workspace }}/istio-1.22.0/bin/istioctl version --remote=false
          ${{ github.workspace }}/.local/bin/kubectl config view

      - name: Install WireGuard and ufw
        run: |
          sudo apt-get update
          sudo apt-get install -y wireguard ufw
          sudo ufw enable || true
          sudo ufw allow ssh
          sudo ufw allow 51820/udp
          sudo ufw status

      - name: Configure WireGuard
        run: |
          echo "${{ secrets.CLUSTER_WIREGUARD_WG0 }}" | sudo tee /etc/wireguard/wg0.conf

      - name: Start WireGuard
        run: |
          sudo chmod 600 /etc/wireguard/wg0.conf
          sudo chmod 700 /etc/wireguard/
          sudo systemctl daemon-reload || true
          sudo wg-quick up wg0 || true
          sudo wg show wg0 || true

      - name: Setup Helm
        run: |
          curl -fsSL -o get_helm.sh https://raw.githubusercontent.com/helm/helm/master/scripts/get-helm-3
          sudo chmod 700 get_helm.sh
          sudo ./get_helm.sh
          helm version --client

      - name: Destroy Prerequisite Services using Helm
        run: |          
          export HOME="${{ github.workspace }}"
          export WORKDIR="$HOME/Helmsman"
          
          # Verify tools are available
          echo "Using kubectl: $(which kubectl)"
          echo "Using istioctl: $(which istioctl)"
          echo "Using kubeconfig: $KUBECONFIG"
          
          echo "🗑️  Step 1: Uninstalling Istio using istioctl..."
          
          # Determine which namespaces to process
          if [ "${{ github.event.inputs.namespace_selection }}" == "specific" ]; then
            echo "Mode: Specific namespaces"
            IFS=',' read -ra NAMESPACES <<< "${{ github.event.inputs.specific_namespaces }}"
            # Check if istio-operator or istio-system is in the list
            if [[ " ${NAMESPACES[@]} " =~ " istio-operator " ]] || [[ " ${NAMESPACES[@]} " =~ " istio-system " ]]; then
              echo "Uninstalling Istio using istioctl..."
              istioctl uninstall --purge -y || true
            fi
          else
            echo "Mode: All prerequisite namespaces"
            echo "Uninstalling Istio using istioctl..."
            istioctl uninstall --purge -y || true
            NAMESPACES=(cattle-logging-system istio-system istio-operator httpbin)
          fi
          
          echo ""
          echo "🗑️  Step 2: Uninstalling Helm releases..."
          
          # Uninstall Helm releases from selected namespaces (skip istio-operator as it's not managed by Helm)
          for NS in "${NAMESPACES[@]}"; do
            NS=$(echo "$NS" | xargs)  # Trim whitespace
            
            # Skip istio-operator as it's managed by istioctl, not Helm
            if [[ "$NS" == "istio-operator" ]]; then
              echo ""
              echo "Skipping Helm uninstall for namespace: $NS (managed by istioctl)"
              continue
            fi
            
            echo ""
            echo "Processing namespace: $NS"
            
            # Get all helm releases in this namespace and uninstall them
            RELEASES=$(helm list -n "$NS" -q 2>/dev/null || true)
            if [ -n "$RELEASES" ]; then
              echo "Found releases in $NS: $RELEASES"
              for RELEASE in $RELEASES; do
                echo "  → Uninstalling release: $RELEASE"
                helm uninstall "$RELEASE" -n "$NS" --wait --timeout=5m || true
              done
            else
              echo "  No Helm releases found in namespace: $NS"
            fi
          done
          
          echo ""
          echo "🗑️  Step 3: Deleting namespaces..."
          
          # Delete the selected namespaces
          for NS in "${NAMESPACES[@]}"; do
            NS=$(echo "$NS" | xargs)  # Trim whitespace
            echo "Deleting namespace: $NS"
            kubectl delete namespace "$NS" --ignore-not-found=true --timeout=5m
          done

      - name: Verify Prereq Resource Cleanup
        run: |
          if [ "${{ github.event.inputs.namespace_selection }}" == "specific" ]; then
            IFS=',' read -ra NAMESPACES <<< "${{ github.event.inputs.specific_namespaces }}"
          else
            NAMESPACES=( cattle-logging-system istio-system istio-operator httpbin cattle-monitoring-system)
          fi
          
          for NS in "${NAMESPACES[@]}"; do
            NS=$(echo "$NS" | xargs)  # Trim whitespace
            if kubectl get namespace "$NS" >/dev/null 2>&1; then
              echo "⚠️  Namespace $NS still exists"
              kubectl get all -n "$NS"
            else
              echo "✅ Namespace $NS successfully removed"
            fi
          done