[defaults]
# Ansible configuration for RKE2 cluster installation.
# These settings are commented out by default.
# Uncomment individual options here instead of setting environment variables
# in run-ansible.sh when additional tuning or debugging is needed.

# --- Output / Logging ---
# debug                  = false
# verbose_to_stderr      = false
# display_skipped_hosts  = true
# display_ok_hosts       = true
# display_failed_stderr  = true
# stdout_callback        = yaml
# callbacks_enabled      = profile_tasks,timer   # use callback_whitelist for Ansible < 2.11
# force_color            = true

# --- Connection / Auth ---
# host_key_checking      = false
# timeout                = 120
# gather_timeout         = 300

[ssh_connection]
# retries                = 2
# pipelining             = true
