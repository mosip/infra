[defaults]
# Ansible configuration for RKE2 cluster installation.
# Prefer editing this file over adding CLI flags or export statements in run-ansible.sh.

# --- Output / Logging ---
# debug                  = false
# verbose_to_stderr      = false
display_skipped_hosts    = true
display_ok_hosts         = true
display_failed_stderr    = true
stdout_callback          = ansible.builtin.default
result_format            = yaml
# callbacks_enabled      = profile_tasks,timer   # use callback_whitelist for Ansible < 2.11
force_color              = true

# --- Execution ---
forks                    = 5

# --- Connection / Auth ---
# Connection timeout per host in seconds. Mirrors --timeout in run-ansible.sh;
# defined here so it applies to all connection attempts, not just CLI runs.
timeout                  = 900
gather_timeout           = 300
# Note: host key verification is handled via StrictHostKeyChecking=accept-new
# in --ssh-common-args in run-ansible.sh (paired with a per-run known_hosts file);
# do not set host_key_checking = False here.

[ssh_connection]
pipelining               = true
retries                  = 3
# Base SSH args: multiplexing and keepalive options shared across all connections.
# StrictHostKeyChecking and UserKnownHostsFile are intentionally NOT set here —
# they are passed per-run via --ssh-common-args in run-ansible.sh using a transient
# known_hosts file (mktemp) so accept-new works correctly on first contact.
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o ServerAliveInterval=30 -o ServerAliveCountMax=5 -o ConnectTimeout=30

