[defaults]
# Ansible configuration for RKE2 cluster installation.
# All settings are commented out — Ansible built-in defaults apply.
# Uncomment individual options here instead of adding CLI flags or export
# statements in run-ansible.sh when additional tuning or debugging is needed.

# --- Output / Logging ---
# debug                  = false
# verbose_to_stderr      = false
# display_skipped_hosts  = true
# display_ok_hosts       = true
# display_failed_stderr  = true
# stdout_callback        = ansible.builtin.default  # use result_format=yaml alongside this for YAML output
# result_format          = yaml
# callbacks_enabled      = profile_tasks,timer      # use callback_whitelist for Ansible < 2.11
# force_color            = true

# --- Execution ---
# forks                  = 5

# --- Connection / Auth ---
# timeout                = 900    # per-host connection timeout in seconds
# gather_timeout         = 300
# Note: host key verification is handled via StrictHostKeyChecking=accept-new
# in --ssh-common-args in run-ansible.sh (paired with a per-run known_hosts file);
# do not set host_key_checking = False here.

[ssh_connection]
# pipelining             = true
# retries                = 3
# Base SSH args — uncomment to set shared connection options via cfg instead of CLI.
# StrictHostKeyChecking and UserKnownHostsFile must stay in --ssh-common-args in
# run-ansible.sh because they reference a runtime shell variable (KNOWN_HOSTS_FILE).
# ssh_args               = -o ControlMaster=auto -o ControlPersist=60s -o ServerAliveInterval=30 -o ServerAliveCountMax=5 -o ConnectTimeout=30

