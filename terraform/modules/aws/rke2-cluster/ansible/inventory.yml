---
all:
  vars:
    cluster_name: "soil"
    cluster_env_domain: "mosip.local"
    k8s_infra_repo_url: "https://github.com/mosip/k8s-infra.git"
    k8s_infra_branch: "v1.2.1.0"
    install_rke2_version: "v1.28.9+rke2r1"
    enable_rancher_import: true
    rancher_import_url: "kubectl apply -f https://rancher.mosip.net/v3/import/bf5zmc89cnsnzhrzwrfnx2q6z65f8dm9hxghmggz86zbk2shv67gkl_c-m-pjnbtmhm.yaml"
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ./ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    control_plane:
      hosts:
        soil-CONTROL-PLANE-NODE-1:
          ansible_host: 172.31.64.90
          node_role: control_plane
          is_primary: true
          node_index: 0
        soil-CONTROL-PLANE-NODE-2:
          ansible_host: 172.31.73.73
          node_role: control_plane
          is_primary: false
          node_index: 1
        soil-CONTROL-PLANE-NODE-3:
          ansible_host: 172.31.70.58
          node_role: control_plane
          is_primary: false
          node_index: 2
    
    etcd:
      hosts:
        soil-ETCD-NODE-1:
          ansible_host: 172.31.76.172
          node_role: etcd
        soil-ETCD-NODE-2:
          ansible_host: 172.31.78.52
          node_role: etcd
        soil-ETCD-NODE-3:
          ansible_host: 172.31.73.251
          node_role: etcd
    
    workers:
      hosts:
        soil-WORKER-NODE-1:
          ansible_host: 172.31.74.179
          node_role: worker

    rke2_cluster:
      children:
        control_plane:
        etcd:
        workers:
