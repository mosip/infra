---
all:
  vars:
    cluster_name: "soil01"
    cluster_env_domain: "mosip.local"
    k8s_infra_repo_url: "https://github.com/mosip/k8s-infra.git"
    k8s_infra_branch: "release-1.2.1.x"
    install_rke2_version: "v1.28.9+rke2r1"
    enable_rancher_import: true
    rancher_import_url: "kubectl apply -f https://rancher.mosip.net/v3/import/sbjns997gn22gbc7zst7lmg5cmrwkdwqm6hqjrx2p52bnj9f8gz79q_c-m-8xq9zwcj.yaml"
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ./ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    control_plane:
      hosts:
        soil01-CONTROL-PLANE-NODE-1:
          ansible_host: 172.31.72.186
          node_role: control_plane
          is_primary: true
          node_index: 0
        soil01-CONTROL-PLANE-NODE-2:
          ansible_host: 172.31.64.142
          node_role: control_plane
          is_primary: false
          node_index: 1
        soil01-CONTROL-PLANE-NODE-3:
          ansible_host: 172.31.79.114
          node_role: control_plane
          is_primary: false
          node_index: 2
    
    etcd:
      hosts:
        soil01-ETCD-NODE-1:
          ansible_host: 172.31.74.208
          node_role: etcd
        soil01-ETCD-NODE-2:
          ansible_host: 172.31.75.103
          node_role: etcd
        soil01-ETCD-NODE-3:
          ansible_host: 172.31.71.141
          node_role: etcd
    
    workers:
      hosts:
        soil01-WORKER-NODE-1:
          ansible_host: 172.31.75.154
          node_role: worker
        soil01-WORKER-NODE-2:
          ansible_host: 172.31.64.29
          node_role: worker

    rke2_cluster:
      children:
        control_plane:
        etcd:
        workers:
