---
all:
  vars:
    cluster_name: "esgo"
    cluster_env_domain: "mosip.local"
    k8s_infra_repo_url: "https://github.com/mosip/k8s-infra.git"
    k8s_infra_branch: "release-1.2.1.x"
    install_rke2_version: "v1.28.9+rke2r1"
    enable_rancher_import: true
    rancher_import_url: "kubectl apply -f https://rancher.mosip.net/v3/import/76tcw64g2x6wdpdxs8ggshnnwn8c857v6ldb9xk9wtt94k2wmszpnb_c-m-xlsqxtnw.yaml"
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ./ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    control_plane:
      hosts:
        esgo-CONTROL-PLANE-NODE-1:
          ansible_host: 172.31.77.41
          node_role: control_plane
          is_primary: true
          node_index: 0
    
    etcd:
      hosts:
        esgo-ETCD-NODE-1:
          ansible_host: 172.31.73.135
          node_role: etcd
    
    workers:
      hosts:
        esgo-WORKER-NODE-1:
          ansible_host: 172.31.72.133
          node_role: worker
        esgo-WORKER-NODE-2:
          ansible_host: 172.31.79.33
          node_role: worker

    rke2_cluster:
      children:
        control_plane:
        etcd:
        workers:
