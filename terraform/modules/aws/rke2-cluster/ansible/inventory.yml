---
all:
  vars:
    cluster_name: "qa11"
    cluster_env_domain: "mosip.local"
    k8s_infra_repo_url: "https://github.com/mosip/k8s-infra.git"
    k8s_infra_branch: "v1.2.1.0"
    install_rke2_version: "v1.28.9+rke2r1"
    enable_rancher_import: true
    rancher_import_url: "kubectl apply -f https://rancher.mosip.net/v3/import/kvjjcg7f7dmf7gbnzd59shztpsdtpl4cs4s5txc6q5pb86pk84kx2v_c-m-lxcwn4zd.yaml"
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ./ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    control_plane:
      hosts:
        qa11-CONTROL-PLANE-NODE-1:
          ansible_host: 172.31.64.206
          node_role: control_plane
          is_primary: true
          node_index: 0
        qa11-CONTROL-PLANE-NODE-2:
          ansible_host: 172.31.79.184
          node_role: control_plane
          is_primary: false
          node_index: 1
        qa11-CONTROL-PLANE-NODE-3:
          ansible_host: 172.31.64.121
          node_role: control_plane
          is_primary: false
          node_index: 2
    
    etcd:
      hosts:
        qa11-ETCD-NODE-1:
          ansible_host: 172.31.69.118
          node_role: etcd
        qa11-ETCD-NODE-2:
          ansible_host: 172.31.73.44
          node_role: etcd
        qa11-ETCD-NODE-3:
          ansible_host: 172.31.76.164
          node_role: etcd
    
    workers:
      hosts:
        qa11-WORKER-NODE-1:
          ansible_host: 172.31.67.64
          node_role: worker
        qa11-WORKER-NODE-2:
          ansible_host: 172.31.73.187
          node_role: worker
        qa11-WORKER-NODE-3:
          ansible_host: 172.31.75.222
          node_role: worker
        qa11-WORKER-NODE-4:
          ansible_host: 172.31.69.55
          node_role: worker
        qa11-WORKER-NODE-5:
          ansible_host: 172.31.69.197
          node_role: worker

    rke2_cluster:
      children:
        control_plane:
        etcd:
        workers:
