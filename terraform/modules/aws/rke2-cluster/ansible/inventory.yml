---
all:
  vars:
    cluster_name: "qa21"
    cluster_env_domain: "mosip.local"
    k8s_infra_repo_url: "https://github.com/mosip/k8s-infra.git"
    k8s_infra_branch: "v1.2.1.0"
    install_rke2_version: "v1.28.9+rke2r1"
    enable_rancher_import: true
    rancher_import_url: "kubectl apply -f https://rancher.mosip.net/v3/import/pkr927q2r5pkdmg854jxjxmfdhk6jbvlq7qkphttdxqpd68kzn92vb_c-m-b52lhn9v.yaml"
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ./ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    control_plane:
      hosts:
        qa21-CONTROL-PLANE-NODE-1:
          ansible_host: 172.31.71.250
          node_role: control_plane
          is_primary: true
          node_index: 0
        qa21-CONTROL-PLANE-NODE-2:
          ansible_host: 172.31.74.253
          node_role: control_plane
          is_primary: false
          node_index: 1
        qa21-CONTROL-PLANE-NODE-3:
          ansible_host: 172.31.74.232
          node_role: control_plane
          is_primary: false
          node_index: 2
    
    etcd:
      hosts:
        qa21-ETCD-NODE-1:
          ansible_host: 172.31.77.89
          node_role: etcd
        qa21-ETCD-NODE-2:
          ansible_host: 172.31.68.107
          node_role: etcd
        qa21-ETCD-NODE-3:
          ansible_host: 172.31.67.73
          node_role: etcd
    
    workers:
      hosts:
        qa21-WORKER-NODE-1:
          ansible_host: 172.31.67.227
          node_role: worker
        qa21-WORKER-NODE-2:
          ansible_host: 172.31.65.211
          node_role: worker
        qa21-WORKER-NODE-3:
          ansible_host: 172.31.66.187
          node_role: worker
        qa21-WORKER-NODE-4:
          ansible_host: 172.31.70.232
          node_role: worker
        qa21-WORKER-NODE-5:
          ansible_host: 172.31.76.242
          node_role: worker

    rke2_cluster:
      children:
        control_plane:
        etcd:
        workers:
