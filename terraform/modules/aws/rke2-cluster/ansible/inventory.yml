---
all:
  vars:
    cluster_name: "dev1"
    cluster_env_domain: "mosip.local"
    k8s_infra_repo_url: "https://github.com/mosip/k8s-infra.git"
    k8s_infra_branch: "release-1.2.1.x"
    install_rke2_version: "v1.28.9+rke2r1"
    enable_rancher_import: true
    rancher_import_url: "kubectl apply -f https://rancher.mosip.net/v3/import/2gl4hm2gffnkkl68lm6pfmckdsv5b6rrfvf7n7dt46rjm7t29rm69c_c-m-nkp4sqcv.yaml"
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ./ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    control_plane:
      hosts:
        dev1-CONTROL-PLANE-NODE-1:
          ansible_host: 172.31.69.228
          node_role: control_plane
          is_primary: true
          node_index: 0
        dev1-CONTROL-PLANE-NODE-2:
          ansible_host: 172.31.68.56
          node_role: control_plane
          is_primary: false
          node_index: 1
        dev1-CONTROL-PLANE-NODE-3:
          ansible_host: 172.31.71.175
          node_role: control_plane
          is_primary: false
          node_index: 2
    
    etcd:
      hosts:
        dev1-ETCD-NODE-1:
          ansible_host: 172.31.71.228
          node_role: etcd
        dev1-ETCD-NODE-2:
          ansible_host: 172.31.67.151
          node_role: etcd
        dev1-ETCD-NODE-3:
          ansible_host: 172.31.76.106
          node_role: etcd
    
    workers:
      hosts:
        dev1-WORKER-NODE-1:
          ansible_host: 172.31.71.173
          node_role: worker
        dev1-WORKER-NODE-2:
          ansible_host: 172.31.68.167
          node_role: worker

    rke2_cluster:
      children:
        control_plane:
        etcd:
        workers:
