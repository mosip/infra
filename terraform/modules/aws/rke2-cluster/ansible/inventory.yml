---
all:
  vars:
    cluster_name: "soil002"
    cluster_env_domain: "mosip.local"
    k8s_infra_repo_url: "https://github.com/mosip/k8s-infra.git"
    k8s_infra_branch: "release-1.2.1.x"
    install_rke2_version: "v1.28.9+rke2r1"
    enable_rancher_import: true
    rancher_import_url: "kubectl apply -f https://rancher.mosip.net/v3/import/ff7npq9jd8cbld9k2q6pz77lgqps2w2cszdkdcdlwppv4lcfc48sbm_c-m-bg7wnr9p.yaml"
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ./ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    control_plane:
      hosts:
        soil002-CONTROL-PLANE-NODE-1:
          ansible_host: 172.31.77.221
          node_role: control_plane
          is_primary: true
          node_index: 0
        soil002-CONTROL-PLANE-NODE-2:
          ansible_host: 172.31.73.39
          node_role: control_plane
          is_primary: false
          node_index: 1
        soil002-CONTROL-PLANE-NODE-3:
          ansible_host: 172.31.65.194
          node_role: control_plane
          is_primary: false
          node_index: 2
    
    etcd:
      hosts:
        soil002-ETCD-NODE-1:
          ansible_host: 172.31.75.238
          node_role: etcd
        soil002-ETCD-NODE-2:
          ansible_host: 172.31.79.139
          node_role: etcd
        soil002-ETCD-NODE-3:
          ansible_host: 172.31.76.173
          node_role: etcd
    
    workers:
      hosts:
        soil002-WORKER-NODE-1:
          ansible_host: 172.31.69.154
          node_role: worker

    rke2_cluster:
      children:
        control_plane:
        etcd:
        workers:
