---
all:
  vars:
    cluster_name: "esqa"
    cluster_env_domain: "mosip.local"
    k8s_infra_repo_url: "https://github.com/mosip/k8s-infra.git"
    k8s_infra_branch: "v1.2.1.0"
    install_rke2_version: "v1.28.9+rke2r1"
    enable_rancher_import: true
    rancher_import_url: "kubectl apply -f https://rancher.mosip.net/v3/import/mnz89qvxx9rrlpmb9hnn4w4j9226pw4srclcdx7fvnvlwd5l8rhkq8_c-m-2c8vw77j.yaml"
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ./ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    control_plane:
      hosts:
        esqa-CONTROL-PLANE-NODE-1:
          ansible_host: 172.31.78.25
          node_role: control_plane
          is_primary: true
          node_index: 0
    
    etcd:
      hosts:
        esqa-ETCD-NODE-1:
          ansible_host: 172.31.74.28
          node_role: etcd
    
    workers:
      hosts:
        esqa-WORKER-NODE-1:
          ansible_host: 172.31.76.106
          node_role: worker
        esqa-WORKER-NODE-2:
          ansible_host: 172.31.68.150
          node_role: worker

    rke2_cluster:
      children:
        control_plane:
        etcd:
        workers:
