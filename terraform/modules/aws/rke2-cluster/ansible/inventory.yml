---
all:
  vars:
    cluster_name: "soil51"
    cluster_env_domain: "mosip.local"
    k8s_infra_repo_url: "https://github.com/mosip/k8s-infra.git"
    k8s_infra_branch: "MOSIP-42914"
    install_rke2_version: "v1.28.9+rke2r1"
    enable_rancher_import: true
    rancher_import_url: "kubectl apply -f https://rancher.obs11.mosip.net/v3/import/6l64fbmb6r49ssk7r56bwcdmmg2c2x5sdvd2vbv7666pmmfxn6fzm9_c-m-t56kkpz7.yaml"
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ./ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    control_plane:
      hosts:
        soil51-CONTROL-PLANE-NODE-1:
          ansible_host: 10.0.4.107
          node_role: control_plane
          is_primary: true
          node_index: 0
        soil51-CONTROL-PLANE-NODE-2:
          ansible_host: 10.0.4.121
          node_role: control_plane
          is_primary: false
          node_index: 1
        soil51-CONTROL-PLANE-NODE-3:
          ansible_host: 10.0.4.94
          node_role: control_plane
          is_primary: false
          node_index: 2
    
    etcd:
      hosts:
        soil51-ETCD-NODE-1:
          ansible_host: 10.0.4.17
          node_role: etcd
        soil51-ETCD-NODE-2:
          ansible_host: 10.0.4.212
          node_role: etcd
    
    workers:
      hosts:
        soil51-WORKER-NODE-1:
          ansible_host: 10.0.4.185
          node_role: worker
        soil51-WORKER-NODE-2:
          ansible_host: 10.0.4.72
          node_role: worker

    rke2_cluster:
      children:
        control_plane:
        etcd:
        workers:
