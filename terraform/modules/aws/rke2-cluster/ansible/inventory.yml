---
all:
  vars:
    cluster_name: "soil01"
    cluster_env_domain: "mosip.local"
    k8s_infra_repo_url: "https://github.com/mosip/k8s-infra.git"
    k8s_infra_branch: "release-1.2.1.x"
    install_rke2_version: "v1.28.9+rke2r1"
    enable_rancher_import: true
    rancher_import_url: "kubectl apply -f https://rancher.mosip.net/v3/import/jqhzbxz82wphwglprs58w5x8wl8r8vl4zbdcbwgx4ltr4qkq8cr69r_c-m-7pdvv4r2.yaml"
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ./ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    control_plane:
      hosts:
        soil01-CONTROL-PLANE-NODE-1:
          ansible_host: 172.31.66.30
          node_role: control_plane
          is_primary: true
          node_index: 0
        soil01-CONTROL-PLANE-NODE-2:
          ansible_host: 172.31.73.30
          node_role: control_plane
          is_primary: false
          node_index: 1
        soil01-CONTROL-PLANE-NODE-3:
          ansible_host: 172.31.79.106
          node_role: control_plane
          is_primary: false
          node_index: 2
    
    etcd:
      hosts:
        soil01-ETCD-NODE-1:
          ansible_host: 172.31.74.225
          node_role: etcd
        soil01-ETCD-NODE-2:
          ansible_host: 172.31.71.48
          node_role: etcd
        soil01-ETCD-NODE-3:
          ansible_host: 172.31.69.239
          node_role: etcd
    
    workers:
      hosts:
        soil01-WORKER-NODE-1:
          ansible_host: 172.31.70.216
          node_role: worker
        soil01-WORKER-NODE-2:
          ansible_host: 172.31.79.57
          node_role: worker

    rke2_cluster:
      children:
        control_plane:
        etcd:
        workers:
