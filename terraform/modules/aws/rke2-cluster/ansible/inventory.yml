---
all:
  vars:
    cluster_name: "qa11"
    cluster_env_domain: "mosip.local"
    k8s_infra_repo_url: "https://github.com/mosip/k8s-infra.git"
    k8s_infra_branch: "v1.2.1.2"
    install_rke2_version: "v1.28.9+rke2r1"
    enable_rancher_import: true
    rancher_import_url: "kubectl apply -f https://rancher.mosip.net/v3/import/blnwd5bp85j4kktfgtpn895mvkjb474zrbpk7tgnkgbpmhz74bxt6w_c-m-xj58rfrk.yaml"
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ./ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    control_plane:
      hosts:
        qa11-CONTROL-PLANE-NODE-1:
          ansible_host: 172.31.76.21
          node_role: control_plane
          is_primary: true
          node_index: 0
        qa11-CONTROL-PLANE-NODE-2:
          ansible_host: 172.31.73.166
          node_role: control_plane
          is_primary: false
          node_index: 1
        qa11-CONTROL-PLANE-NODE-3:
          ansible_host: 172.31.64.197
          node_role: control_plane
          is_primary: false
          node_index: 2
    
    etcd:
      hosts:
        qa11-ETCD-NODE-1:
          ansible_host: 172.31.78.36
          node_role: etcd
        qa11-ETCD-NODE-2:
          ansible_host: 172.31.78.156
          node_role: etcd
        qa11-ETCD-NODE-3:
          ansible_host: 172.31.75.118
          node_role: etcd
    
    workers:
      hosts:
        qa11-WORKER-NODE-1:
          ansible_host: 172.31.79.181
          node_role: worker
        qa11-WORKER-NODE-2:
          ansible_host: 172.31.74.204
          node_role: worker
        qa11-WORKER-NODE-3:
          ansible_host: 172.31.73.223
          node_role: worker
        qa11-WORKER-NODE-4:
          ansible_host: 172.31.69.215
          node_role: worker
        qa11-WORKER-NODE-5:
          ansible_host: 172.31.77.32
          node_role: worker

    rke2_cluster:
      children:
        control_plane:
        etcd:
        workers:
