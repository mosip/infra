---
all:
  vars:
    cluster_name: "soil53"
    cluster_env_domain: "mosip.local"
    k8s_infra_repo_url: "https://github.com/mosip/k8s-infra.git"
    k8s_infra_branch: "MOSIP-42914"
    install_rke2_version: "v1.28.9+rke2r1"
    enable_rancher_import: true
    rancher_import_url: "kubectl apply -f https://rancher.obs13.mosip.net/v3/import/bz742lnl7d2thfd2p28cj7txvjmxk7tw5zqgqh69js5spv4bd6lxkq_c-m-prtk84kn.yaml"
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ./ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    control_plane:
      hosts:
        soil53-CONTROL-PLANE-NODE-1:
          ansible_host: 10.0.4.176
          node_role: control_plane
          is_primary: true
          node_index: 0
    
    etcd:
      hosts:
        soil53-ETCD-NODE-1:
          ansible_host: 10.0.4.59
          node_role: etcd
    
    workers:
      hosts:
        soil53-WORKER-NODE-1:
          ansible_host: 10.0.4.138
          node_role: worker
        soil53-WORKER-NODE-2:
          ansible_host: 10.0.4.217
          node_role: worker

    rke2_cluster:
      children:
        control_plane:
        etcd:
        workers:
