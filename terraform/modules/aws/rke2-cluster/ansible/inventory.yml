---
all:
  vars:
    cluster_name: "qainji"
    cluster_env_domain: "mosip.local"
    k8s_infra_repo_url: "https://github.com/mosip/k8s-infra.git"
    k8s_infra_branch: "v1.2.1.0"
    install_rke2_version: "v1.28.9+rke2r1"
    enable_rancher_import: true
    rancher_import_url: "kubectl apply -f https://rancher.mosip.net/v3/import/nxxm57c8p8sxpfwd7fxf9x45qzttqt2wgmfqzsgmf87plzsb28q59g_c-m-ptrx8zsz.yaml"
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ./ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    control_plane:
      hosts:
        qainji-CONTROL-PLANE-NODE-1:
          ansible_host: 172.31.79.27
          node_role: control_plane
          is_primary: true
          node_index: 0
    
    etcd:
      hosts:
        qainji-ETCD-NODE-1:
          ansible_host: 172.31.76.223
          node_role: etcd
    
    workers:
      hosts:
        qainji-WORKER-NODE-1:
          ansible_host: 172.31.75.50
          node_role: worker
        qainji-WORKER-NODE-2:
          ansible_host: 172.31.67.70
          node_role: worker

    rke2_cluster:
      children:
        control_plane:
        etcd:
        workers:
