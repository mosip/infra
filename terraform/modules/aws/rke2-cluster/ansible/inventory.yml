---
all:
  vars:
    cluster_name: "ab6"
    cluster_env_domain: "mosip.local"
    k8s_infra_repo_url: "https://github.com/mosip/k8s-infra.git"
    k8s_infra_branch: "release-1.2.1.x"
    install_rke2_version: "v1.28.9+rke2r1"
    enable_rancher_import: true
    rancher_import_url: "kubectl apply -f https://rancher.mosip.net/v3/import/vpq55gqvz4qdj8fw26mwlxqh97cpwr4fjt65rsqz6gqj9mkqc8hdpm_c-m-q7vgs5vv.yaml"
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ./ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    control_plane:
      hosts:
        ab6-CONTROL-PLANE-NODE-1:
          ansible_host: 172.31.76.183
          node_role: control_plane
          is_primary: true
          node_index: 0
    
    

    rke2_cluster:
      children:
        control_plane:
