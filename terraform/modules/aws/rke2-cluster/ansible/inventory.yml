---
all:
  vars:
    cluster_name: "qa11new"
    cluster_env_domain: "mosip.local"
    k8s_infra_repo_url: "https://github.com/mosip/k8s-infra.git"
    k8s_infra_branch: "release-1.2.1.x"
    install_rke2_version: "v1.28.9+rke2r1"
    enable_rancher_import: true
    rancher_import_url: "kubectl apply -f https://rancher.mosip.net/v3/import/jtvm2c9krr9fhlllsfdpv5rjfgldc9d7h66fc2xzrdw9kjdhlg2gvf_c-m-4z68x7tn.yaml"
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ./ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    control_plane:
      hosts:
        qa11new-CONTROL-PLANE-NODE-1:
          ansible_host: 172.31.77.39
          node_role: control_plane
          is_primary: true
          node_index: 0
        qa11new-CONTROL-PLANE-NODE-2:
          ansible_host: 172.31.72.171
          node_role: control_plane
          is_primary: false
          node_index: 1
        qa11new-CONTROL-PLANE-NODE-3:
          ansible_host: 172.31.67.130
          node_role: control_plane
          is_primary: false
          node_index: 2
    
    etcd:
      hosts:
        qa11new-ETCD-NODE-1:
          ansible_host: 172.31.78.129
          node_role: etcd
        qa11new-ETCD-NODE-2:
          ansible_host: 172.31.66.222
          node_role: etcd
        qa11new-ETCD-NODE-3:
          ansible_host: 172.31.65.9
          node_role: etcd
    
    workers:
      hosts:
        qa11new-WORKER-NODE-1:
          ansible_host: 172.31.69.96
          node_role: worker
        qa11new-WORKER-NODE-2:
          ansible_host: 172.31.77.159
          node_role: worker

    rke2_cluster:
      children:
        control_plane:
        etcd:
        workers:
