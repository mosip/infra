---
all:
  vars:
    cluster_name: "qaj21"
    cluster_env_domain: "mosip.local"
    k8s_infra_repo_url: "https://github.com/mosip/k8s-infra.git"
    k8s_infra_branch: "release-1.2.1.x"
    install_rke2_version: "v1.28.9+rke2r1"
    enable_rancher_import: true
    rancher_import_url: "kubectl apply -f https://rancher.mosip.net/v3/import/5tllg2l6wk52tldwr8wkxh8bsg7n6s9zvpkkntrgf52xt7c4vb2vrx_c-m-2fm7qvqc.yaml"
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ./ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    control_plane:
      hosts:
        qaj21-CONTROL-PLANE-NODE-1:
          ansible_host: 172.31.77.0
          node_role: control_plane
          is_primary: true
          node_index: 0
        qaj21-CONTROL-PLANE-NODE-2:
          ansible_host: 172.31.65.42
          node_role: control_plane
          is_primary: false
          node_index: 1
        qaj21-CONTROL-PLANE-NODE-3:
          ansible_host: 172.31.70.217
          node_role: control_plane
          is_primary: false
          node_index: 2
    
    etcd:
      hosts:
        qaj21-ETCD-NODE-1:
          ansible_host: 172.31.70.88
          node_role: etcd
        qaj21-ETCD-NODE-2:
          ansible_host: 172.31.69.198
          node_role: etcd
        qaj21-ETCD-NODE-3:
          ansible_host: 172.31.66.24
          node_role: etcd
    
    workers:
      hosts:
        qaj21-WORKER-NODE-1:
          ansible_host: 172.31.67.137
          node_role: worker
        qaj21-WORKER-NODE-2:
          ansible_host: 172.31.65.136
          node_role: worker
        qaj21-WORKER-NODE-3:
          ansible_host: 172.31.68.61
          node_role: worker
        qaj21-WORKER-NODE-4:
          ansible_host: 172.31.71.246
          node_role: worker
        qaj21-WORKER-NODE-5:
          ansible_host: 172.31.73.131
          node_role: worker

    rke2_cluster:
      children:
        control_plane:
        etcd:
        workers:
