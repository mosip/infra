---
all:
  vars:
    cluster_name: "esdevtest"
    cluster_env_domain: "mosip.local"
    k8s_infra_repo_url: "https://github.com/mosip/k8s-infra.git"
    k8s_infra_branch: "release-1.2.1.x"
    install_rke2_version: "v1.28.9+rke2r1"
    enable_rancher_import: true
    rancher_import_url: "kubectl apply -f https://rancher.mosip.net/v3/import/f9qh5vjw5mxplh26wq8d6d8jv275wk66s9dfxwzq7rnmkxwlqkr8j5_c-m-2nmkbbnl.yaml"
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ./ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    control_plane:
      hosts:
        esdevtest-CONTROL-PLANE-NODE-1:
          ansible_host: 172.31.69.175
          node_role: control_plane
          is_primary: true
          node_index: 0
    
    etcd:
      hosts:
        esdevtest-ETCD-NODE-1:
          ansible_host: 172.31.66.23
          node_role: etcd
    
    workers:
      hosts:
        esdevtest-WORKER-NODE-1:
          ansible_host: 172.31.78.98
          node_role: worker
        esdevtest-WORKER-NODE-2:
          ansible_host: 172.31.68.18
          node_role: worker

    rke2_cluster:
      children:
        control_plane:
        etcd:
        workers:
