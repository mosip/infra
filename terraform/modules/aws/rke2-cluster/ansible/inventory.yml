---
all:
  vars:
    cluster_name: "soil"
    cluster_env_domain: "mosip.local"
    k8s_infra_repo_url: "https://github.com/mosip/k8s-infra.git"
    k8s_infra_branch: "v1.2.1.0"
    install_rke2_version: "v1.28.9+rke2r1"
    enable_rancher_import: true
    rancher_import_url: "kubectl apply -f https://rancher.mosip.net/v3/import/9m65j26rklcqs44gkv7lf6wj4j4fv8pb4ghjjwr26mf96gd95dn9zr_c-m-5lqwbq5k.yaml"
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ./ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    control_plane:
      hosts:
        soil-CONTROL-PLANE-NODE-1:
          ansible_host: 172.31.66.42
          node_role: control_plane
          is_primary: true
          node_index: 0
        soil-CONTROL-PLANE-NODE-2:
          ansible_host: 172.31.64.54
          node_role: control_plane
          is_primary: false
          node_index: 1
        soil-CONTROL-PLANE-NODE-3:
          ansible_host: 172.31.65.159
          node_role: control_plane
          is_primary: false
          node_index: 2
    
    etcd:
      hosts:
        soil-ETCD-NODE-1:
          ansible_host: 172.31.64.173
          node_role: etcd
        soil-ETCD-NODE-2:
          ansible_host: 172.31.70.166
          node_role: etcd
        soil-ETCD-NODE-3:
          ansible_host: 172.31.76.123
          node_role: etcd
    
    workers:
      hosts:
        soil-WORKER-NODE-1:
          ansible_host: 172.31.65.84
          node_role: worker

    rke2_cluster:
      children:
        control_plane:
        etcd:
        workers:
