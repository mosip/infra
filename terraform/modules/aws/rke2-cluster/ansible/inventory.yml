---
all:
  vars:
    cluster_name: "devupgrade"
    cluster_env_domain: "mosip.local"
    k8s_infra_repo_url: "https://github.com/mosip/k8s-infra.git"
    k8s_infra_branch: "v1.2.1.0"
    install_rke2_version: "v1.28.9+rke2r1"
    enable_rancher_import: true
    rancher_import_url: "kubectl apply -f https://rancher.mosip.net/v3/import/wrppf9jhmwg7ndx8vsdm4b9v4ldwhcvtbrrvsjf992mcxnk5txb65j_c-m-8fp4kckm.yaml"
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ./ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    control_plane:
      hosts:
        devupgrade-CONTROL-PLANE-NODE-1:
          ansible_host: 172.31.65.47
          node_role: control_plane
          is_primary: true
          node_index: 0
        devupgrade-CONTROL-PLANE-NODE-2:
          ansible_host: 172.31.68.13
          node_role: control_plane
          is_primary: false
          node_index: 1
        devupgrade-CONTROL-PLANE-NODE-3:
          ansible_host: 172.31.77.55
          node_role: control_plane
          is_primary: false
          node_index: 2
    
    etcd:
      hosts:
        devupgrade-ETCD-NODE-1:
          ansible_host: 172.31.65.72
          node_role: etcd
        devupgrade-ETCD-NODE-2:
          ansible_host: 172.31.65.184
          node_role: etcd
        devupgrade-ETCD-NODE-3:
          ansible_host: 172.31.73.238
          node_role: etcd
    
    workers:
      hosts:
        devupgrade-WORKER-NODE-1:
          ansible_host: 172.31.78.244
          node_role: worker
        devupgrade-WORKER-NODE-2:
          ansible_host: 172.31.75.76
          node_role: worker
        devupgrade-WORKER-NODE-3:
          ansible_host: 172.31.76.40
          node_role: worker
        devupgrade-WORKER-NODE-4:
          ansible_host: 172.31.71.118
          node_role: worker
        devupgrade-WORKER-NODE-5:
          ansible_host: 172.31.74.115
          node_role: worker

    rke2_cluster:
      children:
        control_plane:
        etcd:
        workers:
