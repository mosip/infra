---
all:
  vars:
    cluster_name: "qajava21"
    cluster_env_domain: "mosip.local"
    k8s_infra_repo_url: "https://github.com/mosip/k8s-infra.git"
    k8s_infra_branch: "v1.2.1.0"
    install_rke2_version: "v1.28.9+rke2r1"
    enable_rancher_import: true
    rancher_import_url: "kubectl apply -f https://rancher.observation.mosip.net/v3/import/vd24mzzlgnns6bj7752457qnwxvn5zzqlf4ngc9kk44qj8zj2k9crh_c-m-zqtt6wmv.yaml"
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ./ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    control_plane:
      hosts:
        qajava21-CONTROL-PLANE-NODE-1:
          ansible_host: 10.0.4.94
          node_role: control_plane
          is_primary: true
          node_index: 0
        qajava21-CONTROL-PLANE-NODE-2:
          ansible_host: 10.0.4.70
          node_role: control_plane
          is_primary: false
          node_index: 1
        qajava21-CONTROL-PLANE-NODE-3:
          ansible_host: 10.0.4.116
          node_role: control_plane
          is_primary: false
          node_index: 2
    
    etcd:
      hosts:
        qajava21-ETCD-NODE-1:
          ansible_host: 10.0.4.127
          node_role: etcd
        qajava21-ETCD-NODE-2:
          ansible_host: 10.0.4.240
          node_role: etcd
        qajava21-ETCD-NODE-3:
          ansible_host: 10.0.4.117
          node_role: etcd
    
    workers:
      hosts:
        qajava21-WORKER-NODE-1:
          ansible_host: 10.0.4.96
          node_role: worker
        qajava21-WORKER-NODE-2:
          ansible_host: 10.0.4.46
          node_role: worker
        qajava21-WORKER-NODE-3:
          ansible_host: 10.0.4.147
          node_role: worker
        qajava21-WORKER-NODE-4:
          ansible_host: 10.0.4.67
          node_role: worker
        qajava21-WORKER-NODE-5:
          ansible_host: 10.0.4.176
          node_role: worker

    rke2_cluster:
      children:
        control_plane:
        etcd:
        workers:
