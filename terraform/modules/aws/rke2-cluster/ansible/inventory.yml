---
all:
  vars:
    cluster_name: "soil50"
    cluster_env_domain: "mosip.local"
    k8s_infra_repo_url: "https://github.com/mosip/k8s-infra.git"
    k8s_infra_branch: "MOSIP-42914"
    install_rke2_version: "v1.28.9+rke2r1"
    enable_rancher_import: true
    rancher_import_url: "kubectl apply -f https://rancher.obs9.mosip.net/v3/import/bctrsvf7pptlpxwfsnx94p2s4cw7lwf4hc95nwfmktrmndl49nj6hh_c-m-m9z4x4sp.yaml"
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ./ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    control_plane:
      hosts:
        soil50-CONTROL-PLANE-NODE-1:
          ansible_host: 10.0.4.163
          node_role: control_plane
          is_primary: true
          node_index: 0
        soil50-CONTROL-PLANE-NODE-2:
          ansible_host: 10.0.4.27
          node_role: control_plane
          is_primary: false
          node_index: 1
        soil50-CONTROL-PLANE-NODE-3:
          ansible_host: 10.0.4.182
          node_role: control_plane
          is_primary: false
          node_index: 2
    
    etcd:
      hosts:
        soil50-ETCD-NODE-1:
          ansible_host: 10.0.4.180
          node_role: etcd
        soil50-ETCD-NODE-2:
          ansible_host: 10.0.4.120
          node_role: etcd
    
    workers:
      hosts:
        soil50-WORKER-NODE-1:
          ansible_host: 10.0.4.118
          node_role: worker
        soil50-WORKER-NODE-2:
          ansible_host: 10.0.4.52
          node_role: worker

    rke2_cluster:
      children:
        control_plane:
        etcd:
        workers:
