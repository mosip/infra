---
all:
  vars:
    cluster_name: "soil51"
    cluster_env_domain: "mosip.local"
    k8s_infra_repo_url: "https://github.com/mosip/k8s-infra.git"
    k8s_infra_branch: "MOSIP-42914"
    install_rke2_version: "v1.28.9+rke2r1"
    enable_rancher_import: true
    rancher_import_url: "kubectl apply -f https://rancher.obs13.mosip.net/v3/import/rz472dzdr9rd7hppbdhhxpd9822smgv6q486mttjd6r5frh7nk5qmz_c-m-v8wczsjl.yaml"
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ./ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    control_plane:
      hosts:
        soil51-CONTROL-PLANE-NODE-1:
          ansible_host: 10.0.4.157
          node_role: control_plane
          is_primary: true
          node_index: 0
        soil51-CONTROL-PLANE-NODE-2:
          ansible_host: 10.0.4.162
          node_role: control_plane
          is_primary: false
          node_index: 1
        soil51-CONTROL-PLANE-NODE-3:
          ansible_host: 10.0.4.49
          node_role: control_plane
          is_primary: false
          node_index: 2
    
    etcd:
      hosts:
        soil51-ETCD-NODE-1:
          ansible_host: 10.0.4.155
          node_role: etcd
        soil51-ETCD-NODE-2:
          ansible_host: 10.0.4.175
          node_role: etcd
        soil51-ETCD-NODE-3:
          ansible_host: 10.0.4.254
          node_role: etcd
    
    workers:
      hosts:
        soil51-WORKER-NODE-1:
          ansible_host: 10.0.4.125
          node_role: worker
        soil51-WORKER-NODE-2:
          ansible_host: 10.0.4.159
          node_role: worker
        soil51-WORKER-NODE-3:
          ansible_host: 10.0.4.79
          node_role: worker

    rke2_cluster:
      children:
        control_plane:
        etcd:
        workers:
