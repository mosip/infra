---
all:
  vars:
    cluster_name: "chaos"
    cluster_env_domain: "mosip.local"
    k8s_infra_repo_url: "https://github.com/mosip/k8s-infra.git"
    k8s_infra_branch: "v1.2.1.0"
    install_rke2_version: "v1.28.9+rke2r1"
    enable_rancher_import: true
    rancher_import_url: "kubectl apply -f https://rancher.observation.mosip.net/v3/import/7sm5nhcz99brt88nhgm49spzkqm74hlwsnrzvq82pstx8wl4xzcmh6_c-m-vkcndhz8.yaml"
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ./ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    control_plane:
      hosts:
        chaos-CONTROL-PLANE-NODE-1:
          ansible_host: 10.0.4.231
          node_role: control_plane
          is_primary: true
          node_index: 0
        chaos-CONTROL-PLANE-NODE-2:
          ansible_host: 10.0.4.107
          node_role: control_plane
          is_primary: false
          node_index: 1
        chaos-CONTROL-PLANE-NODE-3:
          ansible_host: 10.0.4.190
          node_role: control_plane
          is_primary: false
          node_index: 2
    
    etcd:
      hosts:
        chaos-ETCD-NODE-1:
          ansible_host: 10.0.4.214
          node_role: etcd
        chaos-ETCD-NODE-2:
          ansible_host: 10.0.4.249
          node_role: etcd
        chaos-ETCD-NODE-3:
          ansible_host: 10.0.4.85
          node_role: etcd
    
    workers:
      hosts:
        chaos-WORKER-NODE-1:
          ansible_host: 10.0.4.141
          node_role: worker

    rke2_cluster:
      children:
        control_plane:
        etcd:
        workers:
