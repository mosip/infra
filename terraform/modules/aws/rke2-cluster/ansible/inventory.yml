---
all:
  vars:
    cluster_name: "soil54"
    cluster_env_domain: "mosip.local"
    k8s_infra_repo_url: "https://github.com/mosip/k8s-infra.git"
    k8s_infra_branch: "MOSIP-42914"
    install_rke2_version: "v1.28.9+rke2r1"
    enable_rancher_import: true
    rancher_import_url: "kubectl apply -f https://rancher.obs13.mosip.net/v3/import/gw6qw26rv8rqxhgpwdwmbkdfv8kpg25zbxhv9p8n89d84rnnlx5hff_c-m-jkmk2x79.yaml"
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ./ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    control_plane:
      hosts:
        soil54-CONTROL-PLANE-NODE-1:
          ansible_host: 10.0.4.224
          node_role: control_plane
          is_primary: true
          node_index: 0
    
    etcd:
      hosts:
        soil54-ETCD-NODE-1:
          ansible_host: 10.0.4.4
          node_role: etcd
    
    workers:
      hosts:
        soil54-WORKER-NODE-1:
          ansible_host: 10.0.4.214
          node_role: worker

    rke2_cluster:
      children:
        control_plane:
        etcd:
        workers:
