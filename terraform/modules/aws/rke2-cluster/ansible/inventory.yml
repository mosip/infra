---
all:
  vars:
    cluster_name: "testsoil25"
    cluster_env_domain: "mosip.local"
    k8s_infra_repo_url: "https://github.com/mosip/k8s-infra.git"
    k8s_infra_branch: "MOSIP-42914"
    install_rke2_version: "v1.28.9+rke2r1"
    enable_rancher_import: true
    rancher_import_url: "kubectl apply -f https://rancher.obs17.mosip.net/v3/import/sp8lsc5w9wbc4lwlh6fdsv677jlbx7psdgdwjz9wlcbb5j4tjv4nbb_c-m-plptx6cl.yaml"
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ./ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    control_plane:
      hosts:
        testsoil25-CONTROL-PLANE-NODE-1:
          ansible_host: 10.0.4.163
          node_role: control_plane
          is_primary: true
          node_index: 0
    
    etcd:
      hosts:
        testsoil25-ETCD-NODE-1:
          ansible_host: 10.0.4.101
          node_role: etcd
    
    workers:
      hosts:
        testsoil25-WORKER-NODE-1:
          ansible_host: 10.0.4.58
          node_role: worker
        testsoil25-WORKER-NODE-2:
          ansible_host: 10.0.4.188
          node_role: worker
        testsoil25-WORKER-NODE-3:
          ansible_host: 10.0.4.82
          node_role: worker

    rke2_cluster:
      children:
        control_plane:
        etcd:
        workers:
