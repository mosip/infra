---
all:
  vars:
    cluster_name: "estest"
    cluster_env_domain: "mosip.local"
    k8s_infra_repo_url: "https://github.com/mosip/k8s-infra.git"
    k8s_infra_branch: "release-1.2.1.x"
    install_rke2_version: "v1.28.9+rke2r1"
    enable_rancher_import: false
    rancher_import_url: 
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ./ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    control_plane:
      hosts:
        estest-CONTROL-PLANE-NODE-1:
          ansible_host: 172.31.76.113
          node_role: control_plane
          is_primary: true
          node_index: 0
    
    etcd:
      hosts:
        estest-ETCD-NODE-1:
          ansible_host: 172.31.79.239
          node_role: etcd
    
    workers:
      hosts:
        estest-WORKER-NODE-1:
          ansible_host: 172.31.69.9
          node_role: worker
        estest-WORKER-NODE-2:
          ansible_host: 172.31.79.161
          node_role: worker

    rke2_cluster:
      children:
        control_plane:
        etcd:
        workers:
