---
all:
  vars:
    cluster_name: "soil1"
    cluster_env_domain: "mosip.local"
    k8s_infra_repo_url: "https://github.com/mosip/k8s-infra.git"
    k8s_infra_branch: "v1.2.1.0"
    install_rke2_version: "v1.28.9+rke2r1"
    enable_rancher_import: true
    rancher_import_url: "kubectl apply -f https://rancher.mosip.net/v3/import/k9t9z8n74f9x64m9g28jkjp9fk5zjb56lghgzbrxwmd89ztqx7xjqr_c-m-ngtvm56s.yaml"
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ./ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    control_plane:
      hosts:
        soil1-CONTROL-PLANE-NODE-1:
          ansible_host: 172.31.70.233
          node_role: control_plane
          is_primary: true
          node_index: 0
        soil1-CONTROL-PLANE-NODE-2:
          ansible_host: 172.31.66.152
          node_role: control_plane
          is_primary: false
          node_index: 1
        soil1-CONTROL-PLANE-NODE-3:
          ansible_host: 172.31.78.151
          node_role: control_plane
          is_primary: false
          node_index: 2
    
    etcd:
      hosts:
        soil1-ETCD-NODE-1:
          ansible_host: 172.31.76.61
          node_role: etcd
        soil1-ETCD-NODE-2:
          ansible_host: 172.31.72.156
          node_role: etcd
        soil1-ETCD-NODE-3:
          ansible_host: 172.31.72.96
          node_role: etcd
    
    workers:
      hosts:
        soil1-WORKER-NODE-1:
          ansible_host: 172.31.77.173
          node_role: worker

    rke2_cluster:
      children:
        control_plane:
        etcd:
        workers:
