---
all:
  vars:
    cluster_name: "perf"
    cluster_env_domain: "mosip.local"
    k8s_infra_repo_url: "https://github.com/mosip/k8s-infra.git"
    k8s_infra_branch: "release-1.2.1.x"
    install_rke2_version: "v1.28.9+rke2r1"
    enable_rancher_import: true
    rancher_import_url: "kubectl apply -f https://rancher.mosip.net/v3/import/8w4vrjgbvr4ctxd7dm4x4wq852mfxlzdtqh72th49rs6qrhxmbcmpp_c-m-2ssmkzps.yaml"
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ./ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    control_plane:
      hosts:
        perf-CONTROL-PLANE-NODE-1:
          ansible_host: 172.31.74.10
          node_role: control_plane
          is_primary: true
          node_index: 0
        perf-CONTROL-PLANE-NODE-2:
          ansible_host: 172.31.69.151
          node_role: control_plane
          is_primary: false
          node_index: 1
        perf-CONTROL-PLANE-NODE-3:
          ansible_host: 172.31.74.249
          node_role: control_plane
          is_primary: false
          node_index: 2
    
    etcd:
      hosts:
        perf-ETCD-NODE-1:
          ansible_host: 172.31.74.242
          node_role: etcd
        perf-ETCD-NODE-2:
          ansible_host: 172.31.65.176
          node_role: etcd
        perf-ETCD-NODE-3:
          ansible_host: 172.31.77.222
          node_role: etcd
    
    workers:
      hosts:
        perf-WORKER-NODE-1:
          ansible_host: 172.31.73.104
          node_role: worker
        perf-WORKER-NODE-2:
          ansible_host: 172.31.65.180
          node_role: worker

    rke2_cluster:
      children:
        control_plane:
        etcd:
        workers:
