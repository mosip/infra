---
all:
  vars:
    cluster_name: "soil01"
    cluster_env_domain: "mosip.local"
    k8s_infra_repo_url: "https://github.com/mosip/k8s-infra.git"
    k8s_infra_branch: "release-1.2.1.x"
    install_rke2_version: "v1.28.9+rke2r1"
    enable_rancher_import: true
    rancher_import_url: "kubectl apply -f https://rancher.mosip.net/v3/import/jmdtm7kd7d9lhnsgcvpd7r6hx827mrjm4jmp5zjt9zwjrv8zvfxhhn_c-m-zqxjpknq.yaml"
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ./ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    control_plane:
      hosts:
        soil01-CONTROL-PLANE-NODE-1:
          ansible_host: 172.31.68.55
          node_role: control_plane
          is_primary: true
          node_index: 0
        soil01-CONTROL-PLANE-NODE-2:
          ansible_host: 172.31.69.4
          node_role: control_plane
          is_primary: false
          node_index: 1
        soil01-CONTROL-PLANE-NODE-3:
          ansible_host: 172.31.75.135
          node_role: control_plane
          is_primary: false
          node_index: 2
    
    etcd:
      hosts:
        soil01-ETCD-NODE-1:
          ansible_host: 172.31.69.156
          node_role: etcd
        soil01-ETCD-NODE-2:
          ansible_host: 172.31.71.252
          node_role: etcd
        soil01-ETCD-NODE-3:
          ansible_host: 172.31.79.96
          node_role: etcd
    
    workers:
      hosts:
        soil01-WORKER-NODE-1:
          ansible_host: 172.31.69.106
          node_role: worker
        soil01-WORKER-NODE-2:
          ansible_host: 172.31.70.42
          node_role: worker

    rke2_cluster:
      children:
        control_plane:
        etcd:
        workers:
