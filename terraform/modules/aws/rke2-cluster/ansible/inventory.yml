---
all:
  vars:
    cluster_name: "obs13"
    cluster_env_domain: "mosip.local"
    k8s_infra_repo_url: "https://github.com/bhumi46/k8s-infra.git"
    k8s_infra_branch: "develop"
    install_rke2_version: "v1.28.9+rke2r1"
    enable_rancher_import: false
    rancher_import_url: 
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ./ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    control_plane:
      hosts:
        obs13-CONTROL-PLANE-NODE-1:
          ansible_host: 10.0.3.53
          node_role: control_plane
          is_primary: true
          node_index: 0
    
    
    workers:
      hosts:
        obs13-WORKER-NODE-1:
          ansible_host: 10.0.3.93
          node_role: worker

    rke2_cluster:
      children:
        control_plane:
        workers:
