---
all:
  vars:
    cluster_name: "dev01"
    cluster_env_domain: "mosip.local"
    k8s_infra_repo_url: "https://github.com/mosip/k8s-infra.git"
    k8s_infra_branch: "release-1.2.1.x"
    install_rke2_version: "v1.28.9+rke2r1"
    enable_rancher_import: true
    rancher_import_url: "kubectl apply -f https://rancher.mosip.net/v3/import/zvxzl9dbp5vtvb7c2wt7bwlrgdb49mns52hnfwhsq48rcqbzjq9bvj_c-m-klcsjpcn.yaml"
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ./ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    control_plane:
      hosts:
        dev01-CONTROL-PLANE-NODE-1:
          ansible_host: 172.31.72.237
          node_role: control_plane
          is_primary: true
          node_index: 0
        dev01-CONTROL-PLANE-NODE-2:
          ansible_host: 172.31.78.186
          node_role: control_plane
          is_primary: false
          node_index: 1
        dev01-CONTROL-PLANE-NODE-3:
          ansible_host: 172.31.72.7
          node_role: control_plane
          is_primary: false
          node_index: 2
    
    etcd:
      hosts:
        dev01-ETCD-NODE-1:
          ansible_host: 172.31.64.139
          node_role: etcd
        dev01-ETCD-NODE-2:
          ansible_host: 172.31.76.211
          node_role: etcd
        dev01-ETCD-NODE-3:
          ansible_host: 172.31.72.61
          node_role: etcd
    
    workers:
      hosts:
        dev01-WORKER-NODE-1:
          ansible_host: 172.31.68.50
          node_role: worker
        dev01-WORKER-NODE-2:
          ansible_host: 172.31.78.225
          node_role: worker
        dev01-WORKER-NODE-3:
          ansible_host: 172.31.78.229
          node_role: worker
        dev01-WORKER-NODE-4:
          ansible_host: 172.31.78.168
          node_role: worker
        dev01-WORKER-NODE-5:
          ansible_host: 172.31.79.195
          node_role: worker

    rke2_cluster:
      children:
        control_plane:
        etcd:
        workers:
