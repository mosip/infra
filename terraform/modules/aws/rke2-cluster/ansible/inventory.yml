---
all:
  vars:
    cluster_name: "soil"
    cluster_env_domain: "mosip.local"
    k8s_infra_repo_url: "https://github.com/mosip/k8s-infra.git"
    k8s_infra_branch: "v1.2.1.0"
    install_rke2_version: "v1.28.9+rke2r1"
    enable_rancher_import: true
    rancher_import_url: "kubectl apply -f https://rancher.mosip.net/v3/import/7rv8zl64kgx6mkv24dhmp8f9jcghrxnb6p8mctnrwt57sf8rp82npc_c-m-ls2pd7wq.yaml"
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ./ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    control_plane:
      hosts:
        soil-CONTROL-PLANE-NODE-1:
          ansible_host: 172.31.73.25
          node_role: control_plane
          is_primary: true
          node_index: 0
        soil-CONTROL-PLANE-NODE-2:
          ansible_host: 172.31.76.44
          node_role: control_plane
          is_primary: false
          node_index: 1
        soil-CONTROL-PLANE-NODE-3:
          ansible_host: 172.31.71.47
          node_role: control_plane
          is_primary: false
          node_index: 2
    
    etcd:
      hosts:
        soil-ETCD-NODE-1:
          ansible_host: 172.31.67.14
          node_role: etcd
        soil-ETCD-NODE-2:
          ansible_host: 172.31.77.16
          node_role: etcd
        soil-ETCD-NODE-3:
          ansible_host: 172.31.71.64
          node_role: etcd
    
    workers:
      hosts:
        soil-WORKER-NODE-1:
          ansible_host: 172.31.67.249
          node_role: worker

    rke2_cluster:
      children:
        control_plane:
        etcd:
        workers:
