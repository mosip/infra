---
all:
  vars:
    cluster_name: "rapid"
    cluster_env_domain: "mosip.local"
    k8s_infra_repo_url: "https://github.com/mosip/k8s-infra.git"
    k8s_infra_branch: "v1.2.1.0"
    install_rke2_version: "v1.28.9+rke2r1"
    enable_rancher_import: true
    rancher_import_url: "kubectl apply -f https://rancher.mosip.net/v3/import/2wjf2xt78pplh2v7rvd6kmktqqrtw866rb9lq4zhthxtp9srfcfk2c_c-m-9k5vjnz8.yaml"
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ./ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    control_plane:
      hosts:
        rapid-CONTROL-PLANE-NODE-1:
          ansible_host: 172.31.64.173
          node_role: control_plane
          is_primary: true
          node_index: 0
        rapid-CONTROL-PLANE-NODE-2:
          ansible_host: 172.31.67.4
          node_role: control_plane
          is_primary: false
          node_index: 1
        rapid-CONTROL-PLANE-NODE-3:
          ansible_host: 172.31.67.141
          node_role: control_plane
          is_primary: false
          node_index: 2
    
    etcd:
      hosts:
        rapid-ETCD-NODE-1:
          ansible_host: 172.31.74.131
          node_role: etcd
        rapid-ETCD-NODE-2:
          ansible_host: 172.31.78.52
          node_role: etcd
        rapid-ETCD-NODE-3:
          ansible_host: 172.31.77.216
          node_role: etcd
    
    workers:
      hosts:
        rapid-WORKER-NODE-1:
          ansible_host: 172.31.70.112
          node_role: worker
        rapid-WORKER-NODE-2:
          ansible_host: 172.31.65.156
          node_role: worker

    rke2_cluster:
      children:
        control_plane:
        etcd:
        workers:
