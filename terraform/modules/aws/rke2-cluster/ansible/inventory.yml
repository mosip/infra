---
all:
  vars:
    cluster_name: "dev2"
    cluster_env_domain: "mosip.local"
    k8s_infra_repo_url: "https://github.com/mosip/k8s-infra.git"
    k8s_infra_branch: "release-1.2.1.x"
    install_rke2_version: "v1.28.9+rke2r1"
    enable_rancher_import: true
    rancher_import_url: "kubectl apply -f https://rancher.mosip.net/v3/import/hfjd2z566ml9d87l65krvzszkllv2wdslg84wl6k2zvsdhts2c6b8t_c-m-l4hfxl8x.yaml"
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ./ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    control_plane:
      hosts:
        dev2-CONTROL-PLANE-NODE-1:
          ansible_host: 172.31.72.124
          node_role: control_plane
          is_primary: true
          node_index: 0
        dev2-CONTROL-PLANE-NODE-2:
          ansible_host: 172.31.66.62
          node_role: control_plane
          is_primary: false
          node_index: 1
        dev2-CONTROL-PLANE-NODE-3:
          ansible_host: 172.31.73.23
          node_role: control_plane
          is_primary: false
          node_index: 2
    
    etcd:
      hosts:
        dev2-ETCD-NODE-1:
          ansible_host: 172.31.71.43
          node_role: etcd
        dev2-ETCD-NODE-2:
          ansible_host: 172.31.75.136
          node_role: etcd
        dev2-ETCD-NODE-3:
          ansible_host: 172.31.70.17
          node_role: etcd
    
    workers:
      hosts:
        dev2-WORKER-NODE-1:
          ansible_host: 172.31.76.59
          node_role: worker
        dev2-WORKER-NODE-2:
          ansible_host: 172.31.78.59
          node_role: worker

    rke2_cluster:
      children:
        control_plane:
        etcd:
        workers:
