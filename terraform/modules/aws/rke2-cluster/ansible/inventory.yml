---
all:
  vars:
    cluster_name: "soil52"
    cluster_env_domain: "mosip.local"
    k8s_infra_repo_url: "https://github.com/mosip/k8s-infra.git"
    k8s_infra_branch: "MOSIP-42914"
    install_rke2_version: "v1.28.9+rke2r1"
    enable_rancher_import: true
    rancher_import_url: "kubectl apply -f https://rancher.obs13.mosip.net/v3/import/zh7tfl7t7p28wbz2wxrcwvr67rgcj7r9ldfdb5wtjmqxfqc42bhkp5_c-m-cwftv76m.yaml"
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ./ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    control_plane:
      hosts:
        soil52-CONTROL-PLANE-NODE-1:
          ansible_host: 10.0.4.43
          node_role: control_plane
          is_primary: true
          node_index: 0
    
    etcd:
      hosts:
        soil52-ETCD-NODE-1:
          ansible_host: 10.0.4.109
          node_role: etcd
    
    workers:
      hosts:
        soil52-WORKER-NODE-1:
          ansible_host: 10.0.4.31
          node_role: worker

    rke2_cluster:
      children:
        control_plane:
        etcd:
        workers:
