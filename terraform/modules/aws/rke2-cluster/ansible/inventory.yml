---
all:
  vars:
    cluster_name: "qaj21"
    cluster_env_domain: "mosip.local"
    k8s_infra_repo_url: "https://github.com/mosip/k8s-infra.git"
    k8s_infra_branch: "release-1.2.1.x"
    install_rke2_version: "v1.28.9+rke2r1"
    enable_rancher_import: true
    rancher_import_url: "kubectl apply -f https://rancher.mosip.net/v3/import/g48cz8kbzkrn6bmdlqc7x9wcqf245rqbf7g9ttkfk4bsf7pk8n5sdv_c-m-zppdnhn6.yaml"
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ./ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    control_plane:
      hosts:
        qaj21-CONTROL-PLANE-NODE-1:
          ansible_host: 172.31.79.179
          node_role: control_plane
          is_primary: true
          node_index: 0
        qaj21-CONTROL-PLANE-NODE-2:
          ansible_host: 172.31.69.241
          node_role: control_plane
          is_primary: false
          node_index: 1
        qaj21-CONTROL-PLANE-NODE-3:
          ansible_host: 172.31.75.157
          node_role: control_plane
          is_primary: false
          node_index: 2
    
    etcd:
      hosts:
        qaj21-ETCD-NODE-1:
          ansible_host: 172.31.65.38
          node_role: etcd
        qaj21-ETCD-NODE-2:
          ansible_host: 172.31.70.151
          node_role: etcd
        qaj21-ETCD-NODE-3:
          ansible_host: 172.31.72.236
          node_role: etcd
    
    workers:
      hosts:
        qaj21-WORKER-NODE-1:
          ansible_host: 172.31.64.5
          node_role: worker
        qaj21-WORKER-NODE-2:
          ansible_host: 172.31.67.151
          node_role: worker
        qaj21-WORKER-NODE-3:
          ansible_host: 172.31.71.51
          node_role: worker
        qaj21-WORKER-NODE-4:
          ansible_host: 172.31.72.149
          node_role: worker
        qaj21-WORKER-NODE-5:
          ansible_host: 172.31.74.180
          node_role: worker

    rke2_cluster:
      children:
        control_plane:
        etcd:
        workers:
