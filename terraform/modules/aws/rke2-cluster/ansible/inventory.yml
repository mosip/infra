---
all:
  vars:
    cluster_name: "estest1"
    cluster_env_domain: "mosip.local"
    k8s_infra_repo_url: "https://github.com/mosip/k8s-infra.git"
    k8s_infra_branch: "release-1.2.1.x"
    install_rke2_version: "v1.28.9+rke2r1"
    enable_rancher_import: true
    rancher_import_url: "kubectl apply -f https://rancher.mosip.net/v3/import/5v5shrxw5trlzqvrnbxhkzw2ltqxtbl9d8987t8wc8hgj7wmcl9srt_c-m-7sz5mgcw.yaml"
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ./ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    control_plane:
      hosts:
        estest1-CONTROL-PLANE-NODE-1:
          ansible_host: 172.31.74.202
          node_role: control_plane
          is_primary: true
          node_index: 0
    
    etcd:
      hosts:
        estest1-ETCD-NODE-1:
          ansible_host: 172.31.76.198
          node_role: etcd
    
    workers:
      hosts:
        estest1-WORKER-NODE-1:
          ansible_host: 172.31.70.31
          node_role: worker
        estest1-WORKER-NODE-2:
          ansible_host: 172.31.67.159
          node_role: worker

    rke2_cluster:
      children:
        control_plane:
        etcd:
        workers:
