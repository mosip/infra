---
all:
  vars:
    cluster_name: "dev2"
    cluster_env_domain: "mosip.local"
    k8s_infra_repo_url: "https://github.com/mosip/k8s-infra.git"
    k8s_infra_branch: "v1.2.1.0"
    install_rke2_version: "v1.28.9+rke2r1"
    enable_rancher_import: true
    rancher_import_url: "kubectl apply -f https://rancher.mosip.net/v3/import/z4vbg6p5p5m7psdst7vj8z6pn6lxklmv9mxh4k5x2jghv2ss888t7p_c-m-9wh9m4nr.yaml"
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ./ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    control_plane:
      hosts:
        dev2-CONTROL-PLANE-NODE-1:
          ansible_host: 172.31.71.4
          node_role: control_plane
          is_primary: true
          node_index: 0
        dev2-CONTROL-PLANE-NODE-2:
          ansible_host: 172.31.79.132
          node_role: control_plane
          is_primary: false
          node_index: 1
        dev2-CONTROL-PLANE-NODE-3:
          ansible_host: 172.31.64.136
          node_role: control_plane
          is_primary: false
          node_index: 2
    
    etcd:
      hosts:
        dev2-ETCD-NODE-1:
          ansible_host: 172.31.79.164
          node_role: etcd
        dev2-ETCD-NODE-2:
          ansible_host: 172.31.78.84
          node_role: etcd
        dev2-ETCD-NODE-3:
          ansible_host: 172.31.71.208
          node_role: etcd
    
    workers:
      hosts:
        dev2-WORKER-NODE-1:
          ansible_host: 172.31.69.112
          node_role: worker
        dev2-WORKER-NODE-2:
          ansible_host: 172.31.74.133
          node_role: worker

    rke2_cluster:
      children:
        control_plane:
        etcd:
        workers:
