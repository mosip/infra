---
all:
  vars:
    cluster_name: "rdt1"
    cluster_env_domain: "mosip.local"
    k8s_infra_repo_url: "https://github.com/mosip/k8s-infra.git"
    k8s_infra_branch: "release-1.2.1.x"
    install_rke2_version: "v1.28.9+rke2r1"
    enable_rancher_import: true
    rancher_import_url: "kubectl apply -f https://rancher.mosip.net/v3/import/zmz5hrgvl8qvrftbp7hqcdkm8h54mm4vxb6rzrxzf2vbt488skq7n9_c-m-fvsgfl4b.yaml"
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ./ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    control_plane:
      hosts:
        rdt1-CONTROL-PLANE-NODE-1:
          ansible_host: 172.31.68.146
          node_role: control_plane
          is_primary: true
          node_index: 0
        rdt1-CONTROL-PLANE-NODE-2:
          ansible_host: 172.31.79.126
          node_role: control_plane
          is_primary: false
          node_index: 1
        rdt1-CONTROL-PLANE-NODE-3:
          ansible_host: 172.31.70.246
          node_role: control_plane
          is_primary: false
          node_index: 2
    
    etcd:
      hosts:
        rdt1-ETCD-NODE-1:
          ansible_host: 172.31.67.71
          node_role: etcd
        rdt1-ETCD-NODE-2:
          ansible_host: 172.31.73.40
          node_role: etcd
        rdt1-ETCD-NODE-3:
          ansible_host: 172.31.66.124
          node_role: etcd
    
    workers:
      hosts:
        rdt1-WORKER-NODE-1:
          ansible_host: 172.31.69.160
          node_role: worker
        rdt1-WORKER-NODE-2:
          ansible_host: 172.31.74.147
          node_role: worker

    rke2_cluster:
      children:
        control_plane:
        etcd:
        workers:
