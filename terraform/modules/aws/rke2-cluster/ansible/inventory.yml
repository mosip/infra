---
all:
  vars:
    cluster_name: "dev11"
    cluster_env_domain: "mosip.local"
    k8s_infra_repo_url: "https://github.com/mosip/k8s-infra.git"
    k8s_infra_branch: "release-1.2.1.x"
    install_rke2_version: "v1.28.9+rke2r1"
    enable_rancher_import: true
    rancher_import_url: "kubectl apply -f https://rancher.mosip.net/v3/import/rkxfjsc9cz8mw4jlm9h9c7ntkqj5vmpdfbbl4ztcl29gcvp82pb87r_c-m-ks2s26lg.yaml"
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ./ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    control_plane:
      hosts:
        dev11-CONTROL-PLANE-NODE-1:
          ansible_host: 172.31.67.243
          node_role: control_plane
          is_primary: true
          node_index: 0
        dev11-CONTROL-PLANE-NODE-2:
          ansible_host: 172.31.78.5
          node_role: control_plane
          is_primary: false
          node_index: 1
        dev11-CONTROL-PLANE-NODE-3:
          ansible_host: 172.31.64.172
          node_role: control_plane
          is_primary: false
          node_index: 2
    
    etcd:
      hosts:
        dev11-ETCD-NODE-1:
          ansible_host: 172.31.64.137
          node_role: etcd
        dev11-ETCD-NODE-2:
          ansible_host: 172.31.65.194
          node_role: etcd
        dev11-ETCD-NODE-3:
          ansible_host: 172.31.67.175
          node_role: etcd
    
    workers:
      hosts:
        dev11-WORKER-NODE-1:
          ansible_host: 172.31.77.126
          node_role: worker
        dev11-WORKER-NODE-2:
          ansible_host: 172.31.68.86
          node_role: worker

    rke2_cluster:
      children:
        control_plane:
        etcd:
        workers:
