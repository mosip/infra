---
all:
  vars:
    cluster_name: "dev"
    cluster_env_domain: "mosip.local"
    k8s_infra_repo_url: "https://github.com/mosip/k8s-infra.git"
    k8s_infra_branch: "v1.2.1.0"
    install_rke2_version: "v1.28.9+rke2r1"
    enable_rancher_import: true
    rancher_import_url: "kubectl apply -f https://rancher.mosip.net/v3/import/q87qxgcbz6jhs7msbsp67plg7bj7g2df6jwtbq75kbwfkdgrt9265b_c-m-7f6nxtz9.yaml"
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ./ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    control_plane:
      hosts:
        dev-CONTROL-PLANE-NODE-1:
          ansible_host: 172.31.76.66
          node_role: control_plane
          is_primary: true
          node_index: 0
        dev-CONTROL-PLANE-NODE-2:
          ansible_host: 172.31.71.94
          node_role: control_plane
          is_primary: false
          node_index: 1
        dev-CONTROL-PLANE-NODE-3:
          ansible_host: 172.31.73.188
          node_role: control_plane
          is_primary: false
          node_index: 2
    
    etcd:
      hosts:
        dev-ETCD-NODE-1:
          ansible_host: 172.31.76.6
          node_role: etcd
        dev-ETCD-NODE-2:
          ansible_host: 172.31.65.225
          node_role: etcd
        dev-ETCD-NODE-3:
          ansible_host: 172.31.73.54
          node_role: etcd
    
    workers:
      hosts:
        dev-WORKER-NODE-1:
          ansible_host: 172.31.77.136
          node_role: worker
        dev-WORKER-NODE-2:
          ansible_host: 172.31.68.169
          node_role: worker
        dev-WORKER-NODE-3:
          ansible_host: 172.31.68.152
          node_role: worker
        dev-WORKER-NODE-4:
          ansible_host: 172.31.77.54
          node_role: worker

    rke2_cluster:
      children:
        control_plane:
        etcd:
        workers:
