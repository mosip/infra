---
all:
  vars:
    cluster_name: "rapid"
    cluster_env_domain: "mosip.local"
    k8s_infra_repo_url: "https://github.com/mosip/k8s-infra.git"
    k8s_infra_branch: "v1.2.1.0"
    install_rke2_version: "v1.28.9+rke2r1"
    enable_rancher_import: true
    rancher_import_url: "kubectl apply -f https://rancher.mosip.net/v3/import/wpf6krthtplfqqlgbbbw85d9m7pmlgxfc68j6gzfqkvhb7qqmmq5vw_c-m-n6vlxdkf.yaml"
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ./ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    control_plane:
      hosts:
        rapid-CONTROL-PLANE-NODE-1:
          ansible_host: 172.31.67.211
          node_role: control_plane
          is_primary: true
          node_index: 0
        rapid-CONTROL-PLANE-NODE-2:
          ansible_host: 172.31.69.132
          node_role: control_plane
          is_primary: false
          node_index: 1
        rapid-CONTROL-PLANE-NODE-3:
          ansible_host: 172.31.64.48
          node_role: control_plane
          is_primary: false
          node_index: 2
    
    etcd:
      hosts:
        rapid-ETCD-NODE-1:
          ansible_host: 172.31.66.186
          node_role: etcd
        rapid-ETCD-NODE-2:
          ansible_host: 172.31.78.252
          node_role: etcd
        rapid-ETCD-NODE-3:
          ansible_host: 172.31.69.218
          node_role: etcd
    
    workers:
      hosts:
        rapid-WORKER-NODE-1:
          ansible_host: 172.31.73.243
          node_role: worker
        rapid-WORKER-NODE-2:
          ansible_host: 172.31.74.191
          node_role: worker

    rke2_cluster:
      children:
        control_plane:
        etcd:
        workers:
