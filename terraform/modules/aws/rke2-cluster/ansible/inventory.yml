---
all:
  vars:
    cluster_name: "soil55"
    cluster_env_domain: "mosip.local"
    k8s_infra_repo_url: "https://github.com/mosip/k8s-infra.git"
    k8s_infra_branch: "MOSIP-42914"
    install_rke2_version: "v1.28.9+rke2r1"
    enable_rancher_import: true
    rancher_import_url: "kubectl apply -f https://rancher.obs13.mosip.net/v3/import/p7m7bddwjqknjzvhl6nprz2cd4tdtrrb4r4bln678m9hrfgnmdfcdx_c-m-ntmdglsv.yaml"
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ./ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    control_plane:
      hosts:
        soil55-CONTROL-PLANE-NODE-1:
          ansible_host: 10.0.4.72
          node_role: control_plane
          is_primary: true
          node_index: 0
    
    etcd:
      hosts:
        soil55-ETCD-NODE-1:
          ansible_host: 10.0.4.244
          node_role: etcd
    
    workers:
      hosts:
        soil55-WORKER-NODE-1:
          ansible_host: 10.0.4.92
          node_role: worker
        soil55-WORKER-NODE-2:
          ansible_host: 10.0.4.29
          node_role: worker

    rke2_cluster:
      children:
        control_plane:
        etcd:
        workers:
