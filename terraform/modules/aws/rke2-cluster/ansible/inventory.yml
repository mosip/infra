---
all:
  vars:
    cluster_name: "dev0"
    cluster_env_domain: "mosip.local"
    k8s_infra_repo_url: "https://github.com/mosip/k8s-infra.git"
    k8s_infra_branch: "release-1.2.1.x"
    install_rke2_version: "v1.28.9+rke2r1"
    enable_rancher_import: true
    rancher_import_url: "kubectl apply -f https://rancher.mosip.net/v3/import/8w79gxgvmbqxsk7f7wfvs4fjsk9n6lrlgnshrbp2q9df4nbrs8k459_c-m-vm97pgd8.yaml"
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ./ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    control_plane:
      hosts:
        dev0-CONTROL-PLANE-NODE-1:
          ansible_host: 172.31.70.34
          node_role: control_plane
          is_primary: true
          node_index: 0
        dev0-CONTROL-PLANE-NODE-2:
          ansible_host: 172.31.69.134
          node_role: control_plane
          is_primary: false
          node_index: 1
        dev0-CONTROL-PLANE-NODE-3:
          ansible_host: 172.31.72.75
          node_role: control_plane
          is_primary: false
          node_index: 2
    
    etcd:
      hosts:
        dev0-ETCD-NODE-1:
          ansible_host: 172.31.69.33
          node_role: etcd
        dev0-ETCD-NODE-2:
          ansible_host: 172.31.76.49
          node_role: etcd
        dev0-ETCD-NODE-3:
          ansible_host: 172.31.70.62
          node_role: etcd
    
    workers:
      hosts:
        dev0-WORKER-NODE-1:
          ansible_host: 172.31.69.27
          node_role: worker
        dev0-WORKER-NODE-2:
          ansible_host: 172.31.79.177
          node_role: worker
        dev0-WORKER-NODE-3:
          ansible_host: 172.31.74.22
          node_role: worker
        dev0-WORKER-NODE-4:
          ansible_host: 172.31.65.22
          node_role: worker

    rke2_cluster:
      children:
        control_plane:
        etcd:
        workers:
