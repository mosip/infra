---
all:
  vars:
    cluster_name: "ga"
    cluster_env_domain: "mosip.local"
    k8s_infra_repo_url: "https://github.com/mosip/k8s-infra.git"
    k8s_infra_branch: "v1.2.1.0"
    install_rke2_version: "v1.28.9+rke2r1"
    enable_rancher_import: true
    rancher_import_url: "kubectl apply -f https://rancher.mosip.net/v3/import/24zdwfhrhxw5mfwc29lzklkkc2q8lh6ntqspwgsk4zmlxwlprwcpfq_c-m-cxjgddrq.yaml"
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ./ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    control_plane:
      hosts:
        ga-CONTROL-PLANE-NODE-1:
          ansible_host: 172.31.73.17
          node_role: control_plane
          is_primary: true
          node_index: 0
        ga-CONTROL-PLANE-NODE-2:
          ansible_host: 172.31.76.140
          node_role: control_plane
          is_primary: false
          node_index: 1
        ga-CONTROL-PLANE-NODE-3:
          ansible_host: 172.31.74.46
          node_role: control_plane
          is_primary: false
          node_index: 2
    
    etcd:
      hosts:
        ga-ETCD-NODE-1:
          ansible_host: 172.31.66.172
          node_role: etcd
        ga-ETCD-NODE-2:
          ansible_host: 172.31.67.36
          node_role: etcd
        ga-ETCD-NODE-3:
          ansible_host: 172.31.69.178
          node_role: etcd
    
    workers:
      hosts:
        ga-WORKER-NODE-1:
          ansible_host: 172.31.68.95
          node_role: worker
        ga-WORKER-NODE-2:
          ansible_host: 172.31.77.69
          node_role: worker

    rke2_cluster:
      children:
        control_plane:
        etcd:
        workers:
