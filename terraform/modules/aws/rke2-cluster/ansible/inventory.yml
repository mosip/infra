---
all:
  vars:
    cluster_name: "testsoil23"
    cluster_env_domain: "mosip.local"
    k8s_infra_repo_url: "https://github.com/mosip/k8s-infra.git"
    k8s_infra_branch: "MOSIP-42914"
    install_rke2_version: "v1.28.9+rke2r1"
    enable_rancher_import: true
    rancher_import_url: "kubectl apply -f https://rancher.obs17.mosip.net/v3/import/9f74pn26gbxdg62vqgnqcqjlp55nx9gxl45w6hvxm26xsgcw8fp6cr_c-m-hndsdwx6.yaml"
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ./ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    control_plane:
      hosts:
        testsoil23-CONTROL-PLANE-NODE-1:
          ansible_host: 10.0.4.5
          node_role: control_plane
          is_primary: true
          node_index: 0
    
    etcd:
      hosts:
        testsoil23-ETCD-NODE-1:
          ansible_host: 10.0.4.10
          node_role: etcd
    
    workers:
      hosts:
        testsoil23-WORKER-NODE-1:
          ansible_host: 10.0.4.122
          node_role: worker

    rke2_cluster:
      children:
        control_plane:
        etcd:
        workers:
