---
all:
  vars:
    cluster_name: "esperf"
    cluster_env_domain: "mosip.local"
    k8s_infra_repo_url: "https://github.com/mosip/k8s-infra.git"
    k8s_infra_branch: "v1.2.1.0"
    install_rke2_version: "v1.28.9+rke2r1"
    enable_rancher_import: true
    rancher_import_url: "kubectl apply -f https://rancher.mosip.net/v3/import/b7dlrzwdmh7rrhwhzvrdmd7b9srmzftdb5f858h4q6m9zmvpjcbqpp_c-m-kwhxmfmc.yaml"
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ./ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    control_plane:
      hosts:
        esperf-CONTROL-PLANE-NODE-1:
          ansible_host: 172.31.65.79
          node_role: control_plane
          is_primary: true
          node_index: 0
    
    etcd:
      hosts:
        esperf-ETCD-NODE-1:
          ansible_host: 172.31.70.20
          node_role: etcd
    
    workers:
      hosts:
        esperf-WORKER-NODE-1:
          ansible_host: 172.31.68.205
          node_role: worker
        esperf-WORKER-NODE-2:
          ansible_host: 172.31.79.174
          node_role: worker

    rke2_cluster:
      children:
        control_plane:
        etcd:
        workers:
