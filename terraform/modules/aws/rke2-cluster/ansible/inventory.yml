---
all:
  vars:
    cluster_name: "gatest"
    cluster_env_domain: "mosip.local"
    k8s_infra_repo_url: "https://github.com/mosip/k8s-infra.git"
    k8s_infra_branch: "v1.2.1.0"
    install_rke2_version: "v1.28.9+rke2r1"
    enable_rancher_import: true
    rancher_import_url: "kubectl apply -f https://rancher.mosip.net/v3/import/cj24q5w7ns7jjxf47fjj6k2p459wpl2297p2ktq7ckdb57grpq4q5q_c-m-9hcldlln.yaml"
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ./ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    control_plane:
      hosts:
        gatest-CONTROL-PLANE-NODE-1:
          ansible_host: 172.31.75.82
          node_role: control_plane
          is_primary: true
          node_index: 0
        gatest-CONTROL-PLANE-NODE-2:
          ansible_host: 172.31.77.65
          node_role: control_plane
          is_primary: false
          node_index: 1
        gatest-CONTROL-PLANE-NODE-3:
          ansible_host: 172.31.79.152
          node_role: control_plane
          is_primary: false
          node_index: 2
    
    etcd:
      hosts:
        gatest-ETCD-NODE-1:
          ansible_host: 172.31.78.193
          node_role: etcd
        gatest-ETCD-NODE-2:
          ansible_host: 172.31.66.71
          node_role: etcd
        gatest-ETCD-NODE-3:
          ansible_host: 172.31.79.29
          node_role: etcd
    
    workers:
      hosts:
        gatest-WORKER-NODE-1:
          ansible_host: 172.31.74.64
          node_role: worker
        gatest-WORKER-NODE-2:
          ansible_host: 172.31.68.164
          node_role: worker

    rke2_cluster:
      children:
        control_plane:
        etcd:
        workers:
