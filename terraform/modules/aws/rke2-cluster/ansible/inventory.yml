---
all:
  vars:
    cluster_name: "qajava21"
    cluster_env_domain: "mosip.local"
    k8s_infra_repo_url: "https://github.com/mosip/k8s-infra.git"
    k8s_infra_branch: "release-1.2.1.x"
    install_rke2_version: "v1.28.9+rke2r1"
    enable_rancher_import: true
    rancher_import_url: "kubectl apply -f https://rancher.mosip.net/v3/import/ggpbd7pb6r2r4qbh2lr82lzzjp4tnkllsvnc27db55p6vbqd7j5rjq_c-r4wrn.yaml"
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ./ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    control_plane:
      hosts:
        qajava21-CONTROL-PLANE-NODE-1:
          ansible_host: 172.31.66.119
          node_role: control_plane
          is_primary: true
          node_index: 0
        qajava21-CONTROL-PLANE-NODE-2:
          ansible_host: 172.31.79.246
          node_role: control_plane
          is_primary: false
          node_index: 1
        qajava21-CONTROL-PLANE-NODE-3:
          ansible_host: 172.31.67.26
          node_role: control_plane
          is_primary: false
          node_index: 2
    
    etcd:
      hosts:
        qajava21-ETCD-NODE-1:
          ansible_host: 172.31.73.224
          node_role: etcd
        qajava21-ETCD-NODE-2:
          ansible_host: 172.31.73.183
          node_role: etcd
        qajava21-ETCD-NODE-3:
          ansible_host: 172.31.74.81
          node_role: etcd
    
    workers:
      hosts:
        qajava21-WORKER-NODE-1:
          ansible_host: 172.31.70.180
          node_role: worker
        qajava21-WORKER-NODE-2:
          ansible_host: 172.31.64.209
          node_role: worker
        qajava21-WORKER-NODE-3:
          ansible_host: 172.31.79.207
          node_role: worker
        qajava21-WORKER-NODE-4:
          ansible_host: 172.31.69.203
          node_role: worker
        qajava21-WORKER-NODE-5:
          ansible_host: 172.31.72.131
          node_role: worker

    rke2_cluster:
      children:
        control_plane:
        etcd:
        workers:
