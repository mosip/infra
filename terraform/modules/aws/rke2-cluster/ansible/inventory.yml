---
all:
  vars:
    cluster_name: "esqa3"
    cluster_env_domain: "mosip.local"
    k8s_infra_repo_url: "https://github.com/mosip/k8s-infra.git"
    k8s_infra_branch: "release-1.2.1.x"
    install_rke2_version: "v1.28.9+rke2r1"
    enable_rancher_import: true
    rancher_import_url: "kubectl apply -f https://rancher.mosip.net/v3/import/gc2gxkjxhqfgjzcncm25xg4qg64bvlb9xrf2q2rm5xvxxlqrd98jg2_c-m-pllzmsl9.yaml"
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ./ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    control_plane:
      hosts:
        esqa3-CONTROL-PLANE-NODE-1:
          ansible_host: 172.31.64.115
          node_role: control_plane
          is_primary: true
          node_index: 0
    
    etcd:
      hosts:
        esqa3-ETCD-NODE-1:
          ansible_host: 172.31.67.67
          node_role: etcd
    
    workers:
      hosts:
        esqa3-WORKER-NODE-1:
          ansible_host: 172.31.77.51
          node_role: worker
        esqa3-WORKER-NODE-2:
          ansible_host: 172.31.64.104
          node_role: worker

    rke2_cluster:
      children:
        control_plane:
        etcd:
        workers:
