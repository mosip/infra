---
all:
  vars:
    cluster_name: "esqa181"
    cluster_env_domain: "mosip.local"
    k8s_infra_repo_url: "https://github.com/mosip/k8s-infra.git"
    k8s_infra_branch: "release-1.2.1.x"
    install_rke2_version: "v1.28.9+rke2r1"
    enable_rancher_import: true
    rancher_import_url: "kubectl apply -f https://rancher.mosip.net/v3/import/k4n4cg8x2tnxb2d75pmzbhbbwr25vrgwjrftq9jdvghs6lkgg4btxj_c-m-rwmshq5m.yaml"
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ./ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    control_plane:
      hosts:
        esqa181-CONTROL-PLANE-NODE-1:
          ansible_host: 172.31.78.64
          node_role: control_plane
          is_primary: true
          node_index: 0
    
    etcd:
      hosts:
        esqa181-ETCD-NODE-1:
          ansible_host: 172.31.79.82
          node_role: etcd
    
    workers:
      hosts:
        esqa181-WORKER-NODE-1:
          ansible_host: 172.31.76.73
          node_role: worker
        esqa181-WORKER-NODE-2:
          ansible_host: 172.31.76.139
          node_role: worker

    rke2_cluster:
      children:
        control_plane:
        etcd:
        workers:
