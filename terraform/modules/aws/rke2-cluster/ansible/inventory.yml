---
all:
  vars:
    cluster_name: "soil002"
    cluster_env_domain: "mosip.local"
    k8s_infra_repo_url: "https://github.com/mosip/k8s-infra.git"
    k8s_infra_branch: "v1.2.1.0"
    install_rke2_version: "v1.28.9+rke2r1"
    enable_rancher_import: true
    rancher_import_url: "kubectl apply -f https://rancher.mosip.net/v3/import/p9qxm6szbh4qkqp5xmkzn42sqxmvj8j7sz7tsh5t52b586w2zjfdkt_c-m-hphhwfjn.yaml"
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ./ssh_key
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    
  children:
    control_plane:
      hosts:
        soil002-CONTROL-PLANE-NODE-1:
          ansible_host: 172.31.76.32
          node_role: control_plane
          is_primary: true
          node_index: 0
        soil002-CONTROL-PLANE-NODE-2:
          ansible_host: 172.31.64.244
          node_role: control_plane
          is_primary: false
          node_index: 1
        soil002-CONTROL-PLANE-NODE-3:
          ansible_host: 172.31.71.169
          node_role: control_plane
          is_primary: false
          node_index: 2
    
    etcd:
      hosts:
        soil002-ETCD-NODE-1:
          ansible_host: 172.31.77.169
          node_role: etcd
        soil002-ETCD-NODE-2:
          ansible_host: 172.31.68.78
          node_role: etcd
        soil002-ETCD-NODE-3:
          ansible_host: 172.31.72.141
          node_role: etcd
    
    workers:
      hosts:
        soil002-WORKER-NODE-1:
          ansible_host: 172.31.72.63
          node_role: worker

    rke2_cluster:
      children:
        control_plane:
        etcd:
        workers:
