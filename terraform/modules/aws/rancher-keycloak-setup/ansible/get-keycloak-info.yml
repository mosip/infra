---
- name: Get Keycloak Information
  hosts: control_plane
  become: yes
  vars:
    kubeconfig_path: "/etc/rancher/rke2/rke2.yaml"
    kubectl_path: "/var/lib/rancher/rke2/bin/kubectl"
    keycloak_hostname: "{{ keycloak_hostname_var }}"

  tasks:
    - name: Get Keycloak pod status
      shell: "{{ kubectl_path }} get pods -n keycloak | grep keycloak || echo 'Keycloak pods not found'"
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: keycloak_pods

    - name: Display Keycloak status
      debug:
        msg: "{{ keycloak_pods.stdout_lines }}"

    - name: Display Keycloak URL
      debug:
        msg: "Keycloak URL: https://{{ keycloak_hostname }}"

    - name: Display access info
      debug:
        msg: "Access Keycloak admin console with credentials provided by the installation script"
