<svg viewBox="0 0 1400 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Arrow markers -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4a4a4a" />
    </marker>
    
    <!-- Gradient definitions for boxes -->
    <linearGradient id="prereqGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe0b2;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="terraformGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bbdefb;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="helmsmanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e1bee7;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="successGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c8e6c9;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="decisionGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fce4ec;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8bbd0;stop-opacity:1" />
    </linearGradient>
    
    <!-- Animations - Only for arrows -->
    <style>
      @keyframes flowDash {
        to {
          stroke-dashoffset: -20;
        }
      }
      
      .flow-arrow {
        stroke-dasharray: 8, 4;
        animation: flowDash 0.8s linear infinite;
      }
      
      .node-text {
        font-family: Arial, sans-serif;
        font-size: 11px;
        text-anchor: middle;
        fill: #2c2c2c;
      }
      
      .node-subtext {
        font-family: Arial, sans-serif;
        font-size: 9px;
        text-anchor: middle;
        fill: #4a4a4a;
      }
      
      .title-text {
        font-family: Arial, sans-serif;
        font-size: 20px;
        font-weight: bold;
        text-anchor: middle;
        fill: #2c2c2c;
      }
      
      .label-text {
        font-family: Arial, sans-serif;
        font-size: 10px;
        font-weight: bold;
        fill: #2c2c2c;
      }
      
      /* Dark theme support */
      @media (prefers-color-scheme: dark) {
        .node-text {
          fill: #e0e0e0;
        }
        .node-subtext {
          fill: #b0b0b0;
        }
        .title-text {
          fill: #f0f0f0;
        }
        .label-text {
          fill: #e0e0e0;
        }
      }
    </style>
  </defs>
  
  <!-- Background - transparent for theme adaptation -->
  <rect width="1400" height="1000" fill="transparent"/>
  
  <!-- Title -->
  <text x="700" y="30" class="title-text">MOSIP Deployment Flow</text>
  
  <!-- Row 1: Prerequisites -->
  <rect x="50" y="70" width="180" height="50" rx="8" fill="url(#prereqGrad)" stroke="#ff8f00" stroke-width="2"/>
  <text x="140" y="92" class="node-text" font-weight="bold">Fork Repository</text>
  
  <line x1="230" y1="95" x2="270" y2="95" stroke="#4a4a4a" stroke-width="2" marker-end="url(#arrow)" class="flow-arrow"/>
  
  <rect x="270" y="70" width="180" height="50" rx="8" fill="url(#prereqGrad)" stroke="#ff8f00" stroke-width="2"/>
  <text x="360" y="92" class="node-text" font-weight="bold">Configure Secrets</text>
  
  <line x1="450" y1="95" x2="490" y2="95" stroke="#4a4a4a" stroke-width="2" marker-end="url(#arrow)" class="flow-arrow"/>
  
  <rect x="490" y="70" width="200" height="50" rx="8" fill="url(#prereqGrad)" stroke="#ff8f00" stroke-width="2"/>
  <text x="590" y="92" class="node-text" font-weight="bold">Select Cloud Provider</text>
  
  <line x1="590" y1="120" x2="590" y2="160" stroke="#4a4a4a" stroke-width="2" marker-end="url(#arrow)" class="flow-arrow"/>
  
  <!-- Row 2: Base Infrastructure -->
  <rect x="450" y="160" width="280" height="65" rx="8" fill="url(#terraformGrad)" stroke="#1976d2" stroke-width="2"/>
  <text x="590" y="185" class="node-text" font-weight="bold">Terraform: base-infra</text>
  <text x="590" y="200" class="node-subtext">VPC, Networking, WireGuard</text>
  
  <line x1="590" y1="225" x2="590" y2="270" stroke="#4a4a4a" stroke-width="2" marker-end="url(#arrow)" class="flow-arrow"/>
  
  <!-- Row 3: Decision Observability -->
  <path d="M 590,270 L 650,310 L 590,350 L 530,310 Z" fill="url(#decisionGrad)" stroke="#c2185b" stroke-width="2"/>
  <text x="590" y="305" class="node-text" font-weight="bold" font-size="10" fill="#2c2c2c">Deploy</text>
  <text x="590" y="318" class="node-text" font-weight="bold" font-size="10" fill="#2c2c2c">Observability?</text>
  
  <!-- Yes to Observability -->
  <line x1="650" y1="310" x2="780" y2="310" stroke="#4a4a4a" stroke-width="2" class="flow-arrow"/>
  <text x="700" y="305" class="label-text" fill="#388e3c">Yes</text>
  
  <rect x="780" y="280" width="220" height="60" rx="8" fill="url(#terraformGrad)" stroke="#1976d2" stroke-width="2"/>
  <text x="890" y="302" class="node-text" font-weight="bold">Terraform: observ-infra</text>
  <text x="890" y="315" class="node-subtext">Rancher UI, Monitoring</text>
  
  <line x1="890" y1="340" x2="890" y2="380" stroke="#4a4a4a" stroke-width="2" class="flow-arrow"/>
  <line x1="890" y1="380" x2="730" y2="380" stroke="#4a4a4a" stroke-width="2" class="flow-arrow"/>
  <line x1="730" y1="380" x2="730" y2="415" stroke="#4a4a4a" stroke-width="2" marker-end="url(#arrow)" class="flow-arrow"/>
  
  <!-- No path -->
  <line x1="530" y1="310" x2="400" y2="310" stroke="#4a4a4a" stroke-width="2" class="flow-arrow"/>
  <text x="475" y="305" class="label-text" fill="#d32f2f">No</text>
  <line x1="400" y1="310" x2="400" y2="380" stroke="#4a4a4a" stroke-width="2" class="flow-arrow"/>
  <line x1="400" y1="380" x2="490" y2="380" stroke="#4a4a4a" stroke-width="2" class="flow-arrow"/>
  <line x1="490" y1="380" x2="490" y2="415" stroke="#4a4a4a" stroke-width="2" marker-end="url(#arrow)" class="flow-arrow"/>
  
  <!-- Row 4: MOSIP Infrastructure -->
  <rect x="380" y="415" width="460" height="60" rx="8" fill="url(#terraformGrad)" stroke="#1976d2" stroke-width="2"/>
  <text x="610" y="437" class="node-text" font-weight="bold">Terraform: infra</text>
  <text x="610" y="450" class="node-subtext">MOSIP Infrastructure</text>
  
  <line x1="610" y1="475" x2="610" y2="510" stroke="#4a4a4a" stroke-width="2" marker-end="url(#arrow)" class="flow-arrow"/>
  
  <!-- Row 5: Helmsman Prerequisites -->
  <rect x="420" y="510" width="380" height="60" rx="8" fill="url(#helmsmanGrad)" stroke="#7b1fa2" stroke-width="2"/>
  <text x="610" y="532" class="node-text" font-weight="bold">Helmsman: Prerequisites</text>
  <text x="610" y="545" class="node-subtext">Monitoring, Istio, Logging</text>
  
  <line x1="610" y1="570" x2="610" y2="600" stroke="#4a4a4a" stroke-width="2" marker-end="url(#arrow)" class="flow-arrow"/>
  
  <!-- Row 6: External Dependencies -->
  <rect x="420" y="600" width="380" height="60" rx="8" fill="url(#helmsmanGrad)" stroke="#7b1fa2" stroke-width="2"/>
  <text x="610" y="622" class="node-text" font-weight="bold">Helmsman: External Deps</text>
  <text x="610" y="635" class="node-subtext">PostgreSQL, Keycloak, MinIO</text>
  
  <line x1="610" y1="660" x2="610" y2="690" stroke="#4a4a4a" stroke-width="2" marker-end="url(#arrow)" class="flow-arrow"/>
  
  <!-- Row 7: MOSIP Services -->
  <rect x="470" y="690" width="280" height="50" rx="8" fill="url(#helmsmanGrad)" stroke="#7b1fa2" stroke-width="2"/>
  <text x="610" y="712" class="node-text" font-weight="bold">Helmsman: MOSIP Services</text>
  
  <line x1="610" y1="740" x2="610" y2="780" stroke="#4a4a4a" stroke-width="2" marker-end="url(#arrow)" class="flow-arrow"/>
  
  <!-- Row 8: Test Rigs Decision -->
  <path d="M 610,780 L 670,820 L 610,860 L 550,820 Z" fill="url(#decisionGrad)" stroke="#c2185b" stroke-width="2"/>
  <text x="610" y="815" class="node-text" font-weight="bold" font-size="10" fill="#2c2c2c">Deploy</text>
  <text x="610" y="828" class="node-text" font-weight="bold" font-size="10" fill="#2c2c2c">Test Rigs?</text>
  
  <!-- Yes to Test Rigs -->
  <line x1="670" y1="820" x2="850" y2="820" stroke="#4a4a4a" stroke-width="2" class="flow-arrow"/>
  <text x="745" y="815" class="label-text" fill="#388e3c">Yes</text>
  
  <rect x="850" y="790" width="240" height="60" rx="8" fill="url(#helmsmanGrad)" stroke="#7b1fa2" stroke-width="2"/>
  <text x="970" y="812" class="node-text" font-weight="bold">Helmsman: Test Rigs</text>
  <text x="970" y="825" class="node-subtext">API, UI, DSL Testing</text>
  
  <line x1="850" y1="820" x2="780" y2="820" stroke="#4a4a4a" stroke-width="2" class="flow-arrow"/>
  <line x1="780" y1="820" x2="780" y2="860" stroke="#4a4a4a" stroke-width="2" class="flow-arrow"/>
  <line x1="780" y1="860" x2="870" y2="860" stroke="#4a4a4a" stroke-width="2" marker-end="url(#arrow)" class="flow-arrow"/>
  
  <!-- No path to Verify -->
  <line x1="550" y1="820" x2="320" y2="820" stroke="#4a4a4a" stroke-width="2" class="flow-arrow"/>
  <text x="445" y="815" class="label-text" fill="#d32f2f">No</text>
  <line x1="320" y1="820" x2="320" y2="860" stroke="#4a4a4a" stroke-width="2" class="flow-arrow"/>
  <line x1="320" y1="860" x2="710" y2="860" stroke="#4a4a4a" stroke-width="2" marker-end="url(#arrow)" class="flow-arrow"/>
  
  <!-- Row 9: Final Steps -->
  <rect x="710" y="860" width="160" height="50" rx="8" fill="url(#successGrad)" stroke="#388e3c" stroke-width="2"/>
  <text x="790" y="882" class="node-text" font-weight="bold">Verify Deployment</text>
  
  <line x1="870" y1="885" x2="920" y2="885" stroke="#4a4a4a" stroke-width="2" marker-end="url(#arrow)" class="flow-arrow"/>
  
  <rect x="920" y="860" width="200" height="50" rx="8" fill="url(#successGrad)" stroke="#388e3c" stroke-width="2"/>
  <text x="1020" y="882" class="node-text" font-weight="bold">Access MOSIP Platform</text>
  
  <line x1="1120" y1="885" x2="1170" y2="885" stroke="#4a4a4a" stroke-width="2" marker-end="url(#arrow)" class="flow-arrow"/>
  
  <ellipse cx="1250" cy="885" rx="100" ry="30" fill="url(#successGrad)" stroke="#388e3c" stroke-width="3"/>
  <text x="1250" y="892" class="node-text" font-size="12" font-weight="bold" fill="#2e7d32">Deployment Complete ✓</text>
  
    <!-- Legend -->
  <g transform="translate(50, 620)">
    <text x="0" y="0" class="node-text" font-size="12" font-weight="bold" text-anchor="start">Legend:</text>
    
    <rect x="0" y="8" width="60" height="24" rx="4" fill="url(#prereqGrad)" stroke="#ff8f00" stroke-width="1.5"/>
    <line x1="65" y1="20" x2="95" y2="20" stroke="#4a4a4a" stroke-width="2" marker-end="url(#arrow)" class="flow-arrow"/>
    <text x="125" y="24" class="node-text" font-size="9" text-anchor="start">Prerequisites</text>
    
    <rect x="0" y="38" width="60" height="24" rx="4" fill="url(#terraformGrad)" stroke="#1976d2" stroke-width="1.5"/>
    <line x1="65" y1="50" x2="95" y2="50" stroke="#4a4a4a" stroke-width="2" marker-end="url(#arrow)" class="flow-arrow"/>
    <text x="125" y="54" class="node-text" font-size="9" text-anchor="start">Terraform</text>
    
    <rect x="0" y="68" width="60" height="24" rx="4" fill="url(#helmsmanGrad)" stroke="#7b1fa2" stroke-width="1.5"/>
    <line x1="65" y1="80" x2="95" y2="80" stroke="#4a4a4a" stroke-width="2" marker-end="url(#arrow)" class="flow-arrow"/>
    <text x="125" y="84" class="node-text" font-size="9" text-anchor="start">Helmsman</text>
    
    <rect x="0" y="98" width="60" height="24" rx="4" fill="url(#successGrad)" stroke="#388e3c" stroke-width="1.5"/>
    <line x1="65" y1="110" x2="95" y2="110" stroke="#4a4a4a" stroke-width="2" marker-end="url(#arrow)" class="flow-arrow"/>
    <text x="125" y="114" class="node-text" font-size="9" text-anchor="start">Success</text>
    
    <path d="M 30,128 L 50,143 L 30,158 L 10,143 Z" fill="url(#decisionGrad)" stroke="#c2185b" stroke-width="1.5"/>
    <line x1="55" y1="143" x2="95" y2="143" stroke="#4a4a4a" stroke-width="2" marker-end="url(#arrow)" class="flow-arrow"/>
    <text x="125" y="147" class="node-text" font-size="9" text-anchor="start">Decision</text>
  </g>
</svg>