helmDefaults:
  tillerNamespace: kube-system
  tillerless: true
  install: true

helmRepos:
  bitnami: https://charts.bitnami.com/bitnami
  mosip: https://mosip.github.io/mosip-helm
  wiremind: https://wiremind.github.io/wiremind-helm-charts
  kafka-ui: https://provectus.github.io/kafka-ui-charts

# Note: Based on your requirement disable the namespaces which you want to use, by default all the namespaces are protected.
namespaces:
  postgres:
    protected: true
  keycloak:
    protected: true
  softhsm:
    protected: true
  minio:
    protected: true
  clamav:
    protected: true
  activemq:
    protected: true
  kafka:
    protected: true
  s3:
    protected: true
  msg-gateways:
    protected: true
  captcha:
    protected: true
  landing-page:
    protected: true

apps:
  postgres:
    namespace: postgres
    enabled: false
    version: 13.1.5
    chart: bitnami/postgresql
    wait: true
    priority: -16
    valuesFile: "$WORKDIR/utils/postgres-values.yaml"
    timeout: 1200

  istio-addons-psql:
    namespace: postgres
    enabled: true
    version: 0.1.0
    chart: $WORKDIR/utils/istio-addons/postgres-istio-addons-0.1.0.tgz
    set:
      postgresHost: "postgres.${domain_name}"
    wait: true
    priority: -4
    timeout: 1200

  postgres-init:
    namespace: postgres
    enabled: true
    version: 0.0.1-develop
    chart: mosip/postgres-init
    set:
      databases.mosip_master.enabled: "true"
      databases.mosip_master.scriptsDir: "mosip_master"
      databases.mosip_master.dbName: "mosip_master"
      databases.mosip_master.dbUser: "masteruser"
      databases.mosip_master.branch: "develop"
      databases.mosip_master.host: "postgres.${domain_name}"
      databases.mosip_master.port: 5433
      databases.mosip_master.dml: 1
      databases.mosip_master.repoUrl: "https://github.com/mosip/admin-services.git"
      databases.mosip_master.defaultDb: "postgres"
      databases.mosip_master.su.user: "postgres"
      databases.mosip_master.su.secret.name: "postgres-postgresql"
      databases.mosip_master.su.secret.key: "postgres-password"
      
      databases.mosip_audit.enabled: "true"
      databases.mosip_audit.scriptsDir: "mosip_audit"
      databases.mosip_audit.dbName: "mosip_audit"
      databases.mosip_audit.dbUser: "audituser"
      databases.mosip_audit.branch: "develop"
      databases.mosip_audit.host: "postgres.${domain_name}"
      databases.mosip_audit.port: 5433
      databases.mosip_audit.dml: 0
      databases.mosip_audit.repoUrl: "https://github.com/mosip/audit-manager.git"
      databases.mosip_audit.defaultDb: "postgres"
      databases.mosip_audit.su.user: "postgres"
      databases.mosip_audit.su.secret.name: "postgres-postgresql"
      databases.mosip_audit.su.secret.key: "postgres-password"

      databases.mosip_keymgr.enabled: "true"
      databases.mosip_keymgr.scriptsDir: "mosip_keymgr"
      databases.mosip_keymgr.dbName: "mosip_keymgr"
      databases.mosip_keymgr.dbUser: "keymgruser"
      databases.mosip_keymgr.branch: "develop"
      databases.mosip_keymgr.host: "postgres.${domain_name}"
      databases.mosip_keymgr.port: 5433
      databases.mosip_keymgr.dml: 1
      databases.mosip_keymgr.repoUrl: "https://github.com/mosip/keymanager.git"
      databases.mosip_keymgr.defaultDb: "postgres"
      databases.mosip_keymgr.su.user: "postgres"
      databases.mosip_keymgr.su.secret.name: "postgres-postgresql"
      databases.mosip_keymgr.su.secret.key: "postgres-password"

      databases.mosip_kernel.enabled: "true"
      databases.mosip_kernel.scriptsDir: "mosip_kernel"
      databases.mosip_kernel.dbName: "mosip_kernel"
      databases.mosip_kernel.dbUser: "kerneluser"
      databases.mosip_kernel.branch: "develop"
      databases.mosip_kernel.host: "postgres.${domain_name}"
      databases.mosip_kernel.port: 5433
      databases.mosip_kernel.dml: 0
      databases.mosip_kernel.repoUrl: "https://github.com/mosip/commons.git"
      databases.mosip_kernel.defaultDb: "postgres"
      databases.mosip_kernel.su.user: "postgres"
      databases.mosip_kernel.su.secret.name: "postgres-postgresql"
      databases.mosip_kernel.su.secret.key: "postgres-password"

      databases.mosip_idmap.enabled: "true"
      databases.mosip_idmap.scriptsDir: "mosip_idmap"
      databases.mosip_idmap.dbName: "mosip_idmap"
      databases.mosip_idmap.dbUser: "idmapuser"
      databases.mosip_idmap.branch: "develop"
      databases.mosip_idmap.host: "postgres.${domain_name}"
      databases.mosip_idmap.port: 5433
      databases.mosip_idmap.dml: 0
      databases.mosip_idmap.repoUrl: "https://github.com/mosip/id-repository.git"
      databases.mosip_idmap.defaultDb: "postgres"
      databases.mosip_idmap.su.user: "postgres"
      databases.mosip_idmap.su.secret.name: "postgres-postgresql"
      databases.mosip_idmap.su.secret.key: "postgres-password"
      
      databases.mosip_prereg.enabled: "true"
      databases.mosip_prereg.scriptsDir: "mosip_prereg"
      databases.mosip_prereg.dbName: "mosip_prereg"
      databases.mosip_prereg.dbUser: "prereguser"
      databases.mosip_prereg.branch: "develop"
      databases.mosip_prereg.host: "postgres.${domain_name}"
      databases.mosip_prereg.port: 5433
      databases.mosip_prereg.dml: 0
      databases.mosip_prereg.repoUrl: "https://github.com/mosip/pre-registration.git"
      databases.mosip_prereg.defaultDb: "postgres"
      databases.mosip_prereg.su.user: "postgres"
      databases.mosip_prereg.su.secret.name: "postgres-postgresql"
      databases.mosip_prereg.su.secret.key: "postgres-password"

      databases.mosip_idrepo.enabled: "true"
      databases.mosip_idrepo.scriptsDir: "mosip_idrepo"
      databases.mosip_idrepo.dbName: "mosip_idrepo"
      databases.mosip_idrepo.dbUser: "idrepouser"
      databases.mosip_idrepo.branch: "develop"
      databases.mosip_idrepo.host: "postgres.${domain_name}"
      databases.mosip_idrepo.port: 5433
      databases.mosip_idrepo.dml: 0
      databases.mosip_idrepo.repoUrl: "https://github.com/mosip/id-repository.git"
      databases.mosip_idrepo.defaultDb: "postgres"
      databases.mosip_idrepo.su.user: "postgres"
      databases.mosip_idrepo.su.secret.name: "postgres-postgresql"
      databases.mosip_idrepo.su.secret.key: "postgres-password"

      databases.mosip_ida.enabled: "true"
      databases.mosip_ida.scriptsDir: "mosip_ida"
      databases.mosip_ida.dbName: "mosip_ida"
      databases.mosip_ida.dbUser: "idauser"
      databases.mosip_ida.branch: "develop"
      databases.mosip_ida.host: "postgres.${domain_name}"
      databases.mosip_ida.port: 5433
      databases.mosip_ida.dml: 1
      databases.mosip_ida.repoUrl: "https://github.com/mosip/id-authentication.git"
      databases.mosip_ida.defaultDb: "postgres"
      databases.mosip_ida.su.user: "postgres"
      databases.mosip_ida.su.secret.name: "postgres-postgresql"
      databases.mosip_ida.su.secret.key: "postgres-password"

      databases.mosip_credential.enabled: "true"
      databases.mosip_credential.scriptsDir: "mosip_credential"
      databases.mosip_credential.dbName: "mosip_credential"
      databases.mosip_credential.dbUser: "credentialuser"
      databases.mosip_credential.branch: "develop"
      databases.mosip_credential.host: "postgres.${domain_name}"
      databases.mosip_credential.port: 5433
      databases.mosip_credential.dml: 0
      databases.mosip_credential.repoUrl: "https://github.com/mosip/id-repository.git"
      databases.mosip_credential.defaultDb: "postgres"
      databases.mosip_credential.su.user: "postgres"
      databases.mosip_credential.su.secret.name: "postgres-postgresql"
      databases.mosip_credential.su.secret.key: "postgres-password"

      databases.mosip_regprc.enabled: "true"
      databases.mosip_regprc.scriptsDir: "mosip_regprc"
      databases.mosip_regprc.dbName: "mosip_regprc"
      databases.mosip_regprc.dbUser: "regprcuser"
      databases.mosip_regprc.branch: "develop"
      databases.mosip_regprc.host: "postgres.${domain_name}"
      databases.mosip_regprc.port: 5433
      databases.mosip_regprc.dml: 1
      databases.mosip_regprc.repoUrl: "https://github.com/mosip/registration.git"
      databases.mosip_regprc.defaultDb: "postgres"
      databases.mosip_regprc.su.user: "postgres"
      databases.mosip_regprc.su.secret.name: "postgres-postgresql"
      databases.mosip_regprc.su.secret.key: "postgres-password"

      databases.mosip_pms.enabled: "true"
      databases.mosip_pms.scriptsDir: "mosip_pms"
      databases.mosip_pms.dbName: "mosip_pms"
      databases.mosip_pms.dbUser: "pmsuser"
      databases.mosip_pms.branch: "develop"
      databases.mosip_pms.host: "postgres.${domain_name}"
      databases.mosip_pms.port: 5433
      databases.mosip_pms.dml: 1
      databases.mosip_pms.repoUrl: "https://github.com/mosip/partner-management-services.git"
      databases.mosip_pms.defaultDb: "postgres"
      databases.mosip_pms.su.user: "postgres"
      databases.mosip_pms.su.secret.name: "postgres-postgresql"
      databases.mosip_pms.su.secret.key: "postgres-password"

      databases.mosip_hotlist.enabled: "true"
      databases.mosip_hotlist.scriptsDir: "mosip_hotlist"
      databases.mosip_hotlist.dbName: "mosip_hotlist"
      databases.mosip_hotlist.dbUser: "hotlistuser"
      databases.mosip_hotlist.branch: "develop"
      databases.mosip_hotlist.host: "postgres.${domain_name}"
      databases.mosip_hotlist.port: 5433
      databases.mosip_hotlist.dml: 0
      databases.mosip_hotlist.repoUrl: "https://github.com/mosip/admin-services.git"
      databases.mosip_hotlist.defaultDb: "postgres"
      databases.mosip_hotlist.su.user: "postgres"
      databases.mosip_hotlist.su.secret.name: "postgres-postgresql"
      databases.mosip_hotlist.su.secret.key: "postgres-password"

      databases.mosip_resident.enabled: "true"
      databases.mosip_resident.scriptsDir: "mosip_resident"
      databases.mosip_resident.dbName: "mosip_resident"
      databases.mosip_resident.dbUser: "residentuser"
      databases.mosip_resident.branch: "develop"
      databases.mosip_resident.host: "postgres.${domain_name}"
      databases.mosip_resident.port: 5433
      databases.mosip_resident.dml: 0
      databases.mosip_resident.repoUrl: "https://github.com/mosip/resident-services.git"
      databases.mosip_resident.defaultDb: "postgres"
      databases.mosip_resident.su.user: "postgres"
      databases.mosip_resident.su.secret.name: "postgres-postgresql"
      databases.mosip_resident.su.secret.key: "postgres-password"

      databases.mosip_otp.enabled: "true"
      databases.mosip_otp.scriptsDir: "mosip_otp"
      databases.mosip_otp.dbName: "mosip_otp"
      databases.mosip_otp.dbUser: "otpuser"
      databases.mosip_otp.branch: "develop"
      databases.mosip_otp.host: "postgres.${domain_name}"
      databases.mosip_otp.port: 5433
      databases.mosip_otp.dml: 0
      databases.mosip_otp.repoUrl: "https://github.com/mosip/otp-manager.git"
      databases.mosip_otp.defaultDb: "postgres"
      databases.mosip_otp.su.user: "postgres"
      databases.mosip_otp.su.secret.name: "postgres-postgresql"
      databases.mosip_otp.su.secret.key: "postgres-password"

      databases.mosip_digitalcard.enabled: "true"
      databases.mosip_digitalcard.scriptsDir: "mosip_digitalcard"
      databases.mosip_digitalcard.dbName: "mosip_digitalcard"
      databases.mosip_digitalcard.dbUser: "digitalcarduser"
      databases.mosip_digitalcard.branch: "develop"
      databases.mosip_digitalcard.host: "postgres.${domain_name}"
      databases.mosip_digitalcard.port: 5433
      databases.mosip_digitalcard.dml: 0
      databases.mosip_digitalcard.repoUrl: "https://github.com/mosip/digital-card-service.git"
      databases.mosip_digitalcard.defaultDb: "postgres"
      databases.mosip_digitalcard.su.user: "postgres"
      databases.mosip_digitalcard.su.secret.name: "postgres-postgresql"
      databases.mosip_digitalcard.su.secret.key: "postgres-password"
    wait: true
    timeout: 1200
    priority: -15

  keycloak:
    namespace: keycloak
    enabled: true
    version: 7.1.18
    chart: mosip/keycloak
    set:
      image.repository: "mosipid/mosip-artemis-keycloak"
      image.tag: "1.3.0"
      image.pullPolicy: "Always"
      # Override Postgres image
      postgresql.image.registry: "docker.io"
      postgresql.image.repository: "mosipid/postgresql"
      postgresql.image.tag: "14.2.0-debian-10-r70"
      # postgresql.primary.limits.requests.cpu: 250m
      # postgresql.primary.limits.requests.memory: 256Mi      
      postgresql.primary.resources.requests.cpu: 250m
      postgresql.primary.resources.requests.memory: 256Mi
      # postgresql.architecture: replication
      # postgresql.primary.replicaCount: 1
      # postgresql.primary.persistence.enabled: true
      # postgresql.primary.persistence.size: 8Gi
      # postgresql.readReplicas.replicaCount: 1  # <-- this gives you the 2nd PostgreSQL pod
      # postgresql.readReplicas.persistence.enabled: true
      # postgresql.readReplicas.persistence.size: 8Gi
      service.type: "ClusterIP"
      auth.adminUser: "admin"
      extraEnvVars[0].name: "KEYCLOAK_EXTRA_ARGS"
      extraEnvVars[0].value: "-Dkeycloak.profile.feature.upload_scripts=enabled -Dkeycloak.profile.feature.token_exchange=enabled -Dkeycloak.profile.feature.admin_fine_grained_authz=enabled"
      ingress.enabled: "false"
      ingress.hostname: ""
      ingress.annotations.ingress\.kubernetes\.io/class: "nginx"
      proxyAddressForwarding: "true"
      replicaCount: "1"
      serviceDiscovery.enabled: "true"
      # resources.limits.cpu: "250m"
      # resources.limits.memory: "1Gi"
      resources.requests.cpu: "200m"
      resources.requests.memory: "1000Mi"
      rbac.create: "true"
      rbac.rules[0].apiGroups[0]: ""
      rbac.rules[0].resources[0]: "pods"
      rbac.rules[0].verbs[0]: "get"
      rbac.rules[0].verbs[1]: "list"
    valuesFile: "$WORKDIR/utils/keycloak-postgres-values.yaml"  
    wait: true
    timeout: 1200
    priority: -14

  istio-addons-iam:
    namespace: keycloak
    enabled: true
    version: 0.1.0
    chart: $WORKDIR/utils/istio-addons/iam-istio-addons-0.1.0.tgz
    set:
      keycloakExternalHost: "iam.${domain_name}"
      keycloakInternalHost: "keycloak.keycloak"
      service: "keycloak"
    wait: true
    timeout: 1200
    priority: -3

  keycloak-init:
    namespace: keycloak
    enabled: true
    version: 1.3.0
    chart: mosip/keycloak-init
    set:
      # image.repository: "mosipqa/keycloak-init"
      # image.tag: "1.3.x"
      keycloakExternalHost: "iam.${domain_name}"
      keycloakInternalHost: "keycloak.keycloak"
      keycloak.realms.mosip.realm_config.attributes.frontendUrl: "https://iam.${domain_name}/auth"
      keycloak.realms.mosip.realm_config.smtpServer.auth: "false"
      keycloak.realms.mosip.realm_config.smtpServer.host: "smtp.gmail.com"
      keycloak.realms.mosip.realm_config.smtpServer.port: "465"
      keycloak.realms.mosip.realm_config.smtpServer.from: "mosipqa@gmail.com"
      keycloak.realms.mosip.realm_config.smtpServer.starttls: "false"
      keycloak.realms.mosip.realm_config.smtpServer.ssl: "true"
    wait: true
    timeout: 1200
    priority: -13

  softhsm-kernel:
    namespace: softhsm
    enabled: true
    version: 1.4.1-rc.1
    chart: mosip/softhsm
    set:
      # resources.limits.cpu: "250m"
      # resources.limits.memory: "1Gi"
      resources.requests.cpu: "100m"
      resources.requests.memory: "100Mi"
    wait: true
    timeout: 1200
    priority: -12
    hooks:
      preInstall: "kubectl label ns softhsm istio-injection=enabled --overwrite"

  softhsm-ida:
    namespace: softhsm
    enabled: true
    version: 1.4.1-rc.1
    chart: mosip/softhsm
    set:
      # resources.limits.cpu: "250m"
      # resources.limits.memory: "1Gi"
      resources.requests.cpu: "100m"
      resources.requests.memory: "200Mi"
    wait: true
    timeout: 1200
    priority: -11

  minio:
    namespace: minio
    enabled: true
    version: 15.0.6
    chart: mosip/minio
    set:
      global.security.allowInsecureImages: true
      image.repository: "mosipid/minio"
      image.tag: "2025.2.28-debian-12-r1"
      metrics.serviceMonitor.enabled: "true"
      extraEnvVars[0].name: "MINIO_PROMETHEUS_URL"
      extraEnvVars[0].value: "http://rancher-monitoring-prometheus.cattle-monitoring-system:9090"
      extraEnvVars[1].name: "MINIO_PROMETHEUS_JOB_ID"
      extraEnvVars[1].value: "minio"
      resourcesPreset: "none"
    wait: true
    timeout: 1200
    priority: -10

  istio-addons-minio:
    namespace: minio
    enabled: true
    version: 1.2.0
    chart: $WORKDIR/utils/istio-addons/minio-istio-addons-1.2.0.tgz
    set:
      externalHost: "minio.${domain_name}"
    wait: true
    timeout: 1200
    hooks:
      postInstall: "$WORKDIR/hooks/s3-setup.sh "
    priority: -2

  clamav:
    namespace: clamav
    enabled: true
    version: 3.1.0
    chart: wiremind/clamav
    set:
      replicaCount: "1"
      # image.repository, image.tag, and image.pullPolicy are commented out in the original YAML
      # Uncomment and update as needed:
      image.repository: "mosipid/clamav"
      image.tag: "1.3.0_base"
      # image.pullPolicy: "Always"
    wait: true
    timeout: 1200
    priority: -9

  activemq:
    namespace: activemq
    enabled: true
    version: 0.0.4
    chart: mosip/activemq-artemis
    set:
      # image.repository: "mosipqa/activemq-artemis"
      # image.tag: "1.1.5"
      persistence.storageClass: "nfs-csi-activemq"
      istio.enabled: "true"
      istio.hosts[0]: "activemq.${domain_name}"
      istio.ingressController.name: "ingressgateway-internal"
      istio.prefix: ""
    wait: true
    timeout: 1200
    priority: -8
    hooks:
      postInstall: "$WORKDIR/hooks/captcha-setup.sh ${PREREG_CAPTCHA_SITE_KEY} ${PREREG_CAPTCHA_SECRET_KEY} ${ADMIN_CAPTCHA_SITE_KEY} ${ADMIN_CAPTCHA_SECRET_KEY} ${RESIDENT_CAPTCHA_SITE_KEY} ${RESIDENT_CAPTCHA_SECRET_KEY}"
  # Note: Create a google recaptcha v2 ("I am not a Robot") from Google Recaptcha Admin.
  # Pass the captcha site and secret key in the above post install script as an argument.To create site and secret key below is the link:
  # https://cloud.google.com/security/products/recaptcha
  # https://www.google.com/recaptcha/admin/create

  kafka:
    namespace: kafka
    enabled: true
    version: 18.3.1
    chart: bitnami/kafka
    set:
      # Add these for image overrides
      image.repository: "mosipid/kafka"
      image.tag: "3.2.1-debian-11-r9"
      zookeeper.image.repository: "mosipid/zookeeper"
      zookeeper.image.tag: "3.8.0-debian-11-r30"
      clusterDomain: "cluster.local"
      logRetentionBytes: "_1073741824"
      defaultReplicationFactor: "3"
      offsetsTopicReplicationFactor: "3"
      transactionStateLogReplicationFactor: "3"
      numPartitions: "20"
      replicaCount: "5"
      autoCreateTopicsEnable: "true"
      deleteTopicEnable: "true"
      persistence.enabled: "true"
      persistence.accessModes[0]: "ReadWriteOnce"
      persistence.size: "8Gi"
      zookeeper.enabled: "true"
      zookeeper.replicaCount: "5"
      zookeeper.resources.requests.cpu: "150m"
      zookeeper.resources.requests.memory: "600Mi"
      zookeeper.resources.limits.cpu: "300m"
      zookeeper.resources.limits.memory: "1200Mi"
      zookeeper.persistence.enabled: "true"
      zookeeper.persistence.size: "2Gi"
      resources.limits.cpu: "1000m"
      resources.limits.memory: "3500Mi"
      resources.requests.cpu: "500m"
      resources.requests.memory: "2500Mi"
      startupProbe.enabled: "true"
      startupProbe.initialDelaySeconds: "30"
      startupProbe.periodSeconds: "10"
      startupProbe.timeoutSeconds: "1"
      startupProbe.failureThreshold: "30"
      startupProbe.successThreshold: "1"
    wait: true
    timeout: 1200
    priority: -7

  kafka-ui:
    namespace: kafka
    enabled: true
    version: 0.4.2
    chart: kafka-ui/kafka-ui
    set:
      # Add these for image overrides
      # image.repository: "docker.io/provectuslabs/kafka-ui"
      # image.tag: "v0.4.0"
      envs.config.KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka.kafka:9092"
      envs.config.KAFKA_CLUSTERS_0_NAME: "main_kafka"
      envs.config.KAFKA_CLUSTERS_0_ZOOKEEPER: "kafka-zookeeper.kafka:2181"
      envs.config.KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: "http://debezium-service.reporting:8083"
      envs.config.KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: "debezium"
      envs.config.KAFKA_CLUSTERS_0_KAFKACONNECT_1_ADDRESS: "http://es-connect.reporting:8083"
      envs.config.KAFKA_CLUSTERS_0_KAFKACONNECT_1_NAME: "es-connect"
      image.pullPolicy: "Always"
    wait: true
    timeout: 1200
    priority: -6

  istio-addons-kafka:
    namespace: kafka
    enabled: true
    version: 1.2.0
    chart: $WORKDIR/utils/istio-addons/kafka-istio-addons-1.2.0.tgz
    set:
      kafkaUiHost: "kafka.${domain_name}"
      installName: "kafka-ui"
    wait: true
    timeout: 1200
    hooks:
      postInstall: "$WORKDIR/hooks/msg-gateways-setup.sh"
    priority: -1

  landing-page:
    namespace: landing-page
    enabled: true
    version: 1.3.0
    chart: mosip/landing-page
