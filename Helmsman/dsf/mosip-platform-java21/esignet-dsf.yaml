helmDefaults:
  tillerNamespace: kube-system
  tillerless: true
  install: true

helmRepos:
  bitnami: https://charts.bitnami.com/bitnami
  mosip: https://mosip.github.io/mosip-helm

namespaces:
  postgres:
    protected: true
  esignet:
    protected: false
  keycloak:
    protected: true
  softhsm:
    protected: false
  redis:
    protected: false
  artifactory-1202:
    protected: false
apps:
  postgres:
    namespace: postgres
    enabled: false
    version: 13.1.5
    chart: bitnami/postgresql
    wait: true
    priority: -18
    valuesFile: "$WORKDIR/utils/postgres-values.yaml"
    timeout: 480


  istio-addons-psql:
    namespace: postgres
    enabled: false
    version: 0.1.0
    chart: $WORKDIR/utils/istio-addons/postgres-istio-addons-0.1.0.tgz
    set:
      postgresHost: "postgres.${domain_name}"
    wait: true
    priority: -17
    timeout: 1200

  postgres-init-esignet:
    namespace: esignet
    enabled: true
    version: 12.0.1
    chart: mosip/postgres-init
    set:
      # DB_USER_PASSWORD env var is fetched from postgres namespace in GH Actions
      # and masked automatically by GitHub Actions runner
      dbUserPasswords.dbuserPassword: "$DB_USER_PASSWORD"
      databases.mosip_toolkit.enabled: "false"
      databases.mosip_master.enabled: "false"
      databases.mosip_audit.enabled: "false"
      databases.mosip_keymgr.enabled: "false"
      databases.mosip_kernel.enabled: "false"
      databases.mosip_idmap.enabled: "false"
      databases.mosip_prereg.enabled: "false"
      databases.mosip_idrepo.enabled: "false"
      databases.mosip_ida.enabled: "false"
      databases.mosip_credential.enabled: "false"
      databases.mosip_regprc.enabled: "false"
      databases.mosip_regdevice.enabled: "false"
      databases.mosip_authdevice.enabled: "false"
      databases.mosip_pms.enabled: "false"
      databases.mosip_hotlist.enabled: "false"
      databases.mosip_resident.enabled: "false"
      databases.mosip_digitalcard.enabled: "false"
      # Enable BOTH esignet and mockidentitysystem databases
      databases.mosip_esignet.enabled: "true"
      databases.mosip_esignet.branch: "v1.4.1"
      databases.mosip_esignet.host: "postgres.${domain_name}"
      databases.mosip_esignet.port: 5433
      databases.mosip_esignet.dml: 1
      databases.mosip_mockidentitysystem.enabled: "false"
      databases.mosip_mockidentitysystem.branch: "v0.9.3"
      databases.mosip_mockidentitysystem.host: "postgres.${domain_name}"
      databases.mosip_mockidentitysystem.repoUrl: "https://github.com/mosip/esignet-mock-services.git"
      databases.mosip_mockidentitysystem.port: 5433
      databases.mosip_mockidentitysystem.dml: 1
    wait: true
    timeout: 180
    priority: -16
    hooks:
      preInstall: "$WORKDIR/hooks/esignet-init-db.sh"

  redis:
    namespace: redis
    enabled: true
    version: 17.3.14
    chart: bitnami/redis
    wait: true
    timeout: 480
    priority: -16
    set:
      image.repository: "mosipid/redis"
      image.tag: "7.0.5-debian-11-r25"
    hooks:
      postInstall: "$WORKDIR/hooks/redis-setup.sh"

  softhsm-esignet:
    namespace: softhsm
    enabled: true
    version: 12.0.1
    chart: mosip/softhsm
    valuesFile: "$WORKDIR/utils/softhsm-esignet-values.yaml"
    timeout: 480
    priority: -15
    hooks:
      preInstall: "$WORKDIR/hooks/softhsm-esignet-setup.sh"
      postInstall: "$WORKDIR/hooks/softhsm-esignet-postinstall.sh"

  keycloak:
    namespace: keycloak
    enabled: false
    protected: true # Prevent Helmsman from deleting this release
    version: 7.1.18
    chart: mosip/keycloak
    set:
      image.repository: "mosipid/mosip-artemis-keycloak"
      image.tag: "1.2.0.2"
      image.pullPolicy: "Always"
      # Override Postgres image
      postgresql.image.registry: "docker.io"
      postgresql.image.repository: "mosipid/postgresql"
      postgresql.image.tag: "14.2.0-debian-10-r70"
      service.type: "ClusterIP"
      auth.adminUser: "admin"
      extraEnvVars[0].name: "KEYCLOAK_EXTRA_ARGS"
      extraEnvVars[0].value: "-Dkeycloak.profile.feature.upload_scripts=enabled -Dkeycloak.profile.feature.token_exchange=enabled -Dkeycloak.profile.feature.admin_fine_grained_authz=enabled"
      ingress.enabled: "false"
      ingress.hostname: ""
      ingress.annotations.ingress\.kubernetes\.io/class: "nginx"
      proxyAddressForwarding: "true"
      replicaCount: "1"
      serviceDiscovery.enabled: "true"
      # resources.limits.cpu: "250m"
      # resources.limits.memory: "1Gi"
      resources.requests.cpu: "200m"
      resources.requests.memory: "1000Mi"
      rbac.create: "true"
      rbac.rules[0].apiGroups[0]: ""
      rbac.rules[0].resources[0]: "pods"
      rbac.rules[0].verbs[0]: "get"
      rbac.rules[0].verbs[1]: "list"
    wait: true
    timeout: 600
    priority: -14

  istio-addons-iam:
    namespace: keycloak
    enabled: true
    version: 0.1.0
    chart: $WORKDIR/utils/istio-addons/iam-istio-addons-0.1.0.tgz
    set:
      keycloakExternalHost: "iam.${domain_name}"
      keycloakInternalHost: "keycloak.keycloak"
      service: "keycloak"
    wait: true
    timeout: 1200
    priority: -13

  esignet-keycloak-init:
    namespace: esignet
    enabled: true
    version: 12.0.2
    chart: mosip/keycloak-init
    valuesFile: "$WORKDIR/utils/keycloak-init-values.yaml"
    set:
      # image.repository: "mosipid/keycloak-init"
      # image.tag: "1.2.0.1"
      keycloakExternalHost: "iam.${domain_name}"
      keycloakInternalHost: "keycloak.keycloak"
      clientSecrets[0].name: "$PMS_CLIENT_SECRET_KEY"
      clientSecrets[0].secret: "$PMS_CLIENT_SECRET_VALUE"
      clientSecrets[1].name: "$MPARTNER_DEFAULT_AUTH_SECRET_KEY"
      clientSecrets[1].secret: "$MPARTNER_DEFAULT_AUTH_SECRET_VALUE"
    timeout: 480
    priority: -12
    hooks:
      preInstall: "$WORKDIR/hooks/esignet-preinstall-keycloak-init.sh"
      postInstall: "$WORKDIR/hooks/esignet-postinstall-keycloak-init.sh"

  artifactory-1202:
    namespace: artifactory-1202
    enabled: true
    version: 12.0.2
    chart: mosip/artifactory
    # set:
    #   image.repository: "mosipid/artifactory-server"
    #   image.tag: "1.4.1-ES"
    wait: true
    timeout: 1200
    priority: -12
    hooks:
      # For fresh installations
      preInstall: "kubectl label ns artifactory-1202 istio-injection=enabled --overwrite"

  esignet:
    namespace: esignet
    enabled: true
    version: 1.4.1
    chart: mosip/esignet
    set:
      # image.repository: "mosipid/esignet"
      # image.tag: "1.4.1"
      # Set to true if you don't have public domain & valid SSL (development only)
      enable_insecure: "false"
      extraEnvVarsCM[0]: "global"
      extraEnvVarsCM[1]: "config-server-share"
      extraEnvVarsCM[2]: "artifactory-1202-share"
      extraEnvVarsCM[3]: "softhsm-esignet-share"
    wait: true
    timeout: 600
    priority: -11
    hooks:
      preInstall: "$WORKDIR/hooks/esignet-preinstall.sh"

  oidc-ui:
    namespace: esignet
    enabled: true
    version: 1.4.1
    chart: mosip/oidc-ui
    set:
      istio.hosts[0]: "esignet.${domain_name}"
      extraEnvVarsCM[0]: "global"
      extraEnvVarsCM[1]: "config-server-share"
      extraEnvVarsCM[2]: "artifactory-1202-share"
      extraEnvVarsCM[3]: "softhsm-esignet-share"
      extraEnvVarsCM[4]: "oidc-ui"
      # image.repository: "mosipid/esignet"
      # image.tag: "1.4.1"
    timeout: 1200
    priority: -10
    hooks:
      preInstall: "$WORKDIR/hooks/oidc-ui-preinstall.sh"

  softhsm-mock-identity-system:
    namespace: softhsm
    enabled: false
    version: 12.0.1
    chart: mosip/softhsm
    valuesFile: "$WORKDIR/utils/softhsm-mock-identity-system-values.yaml"
    wait: true
    timeout: 480
    priority: -9
    hooks:
      preInstall: "$WORKDIR/hooks/softhsm-mock-identity-system-preinstall.sh"
      postInstall: "$WORKDIR/hooks/softhsm-mock-identity-system-postinstall.sh"

  mock-identity-system:
    namespace: esignet
    enabled: false
    version: 0.9.3
    chart: mosip/mock-identity-system
    set:
      # Set to true if you don't have public domain & valid SSL (development only)
      enable_insecure: "false"
      extraEnvVarsCM[0]: "global"
      extraEnvVarsCM[1]: "config-server-share"
      extraEnvVarsCM[2]: "artifactory-1202-share"
      extraEnvVarsCM[3]: "softhsm-mock-identity-system-share"
    timeout: 480
    priority: -8
    hooks:
      preInstall: "$WORKDIR/hooks/mock-identity-system-preinstall.sh"

  mock-relying-party-service:
    namespace: esignet
    enabled: true
    version: 0.9.3
    chart: mosip/mock-relying-party-service
    set:
      # eSignet service URL (internal)
      mock_relying_party_service.ESIGNET_SERVICE_URL: "http://esignet.esignet/v1/esignet"
      # eSignet AUD URL (external) - UPDATE with your esignet domain
      mock_relying_party_service.ESIGNET_AUD_URL: "https://esignet.${domain_name}/v1/esignet/oauth/v2/token"
      # Set to true if you don't have public domain & valid SSL (development only)
      enable_insecure: "false"
    timeout: 480
    priority: -7
    hooks:
      preInstall: "$WORKDIR/hooks/mock-relying-party-service-preinstall.sh"

  mock-relying-party-ui:
    namespace: esignet
    enabled: true
    version: 0.9.3
    chart: mosip/mock-relying-party-ui
    set:
      # UPDATE THIS: Mock Relying Party UI domain (e.g., healthservices.${domain_name})
      mock_relying_party_ui.mock_relying_party_ui_service_host: "healthservices.${domain_name}"
      mock_relying_party_ui.ESIGNET_UI_BASE_URL: "https://esignet.${domain_name}"
      mock_relying_party_ui.MOCK_RELYING_PARTY_SERVER_URL: "https://healthservices.${domain_name}/mock-relying-party-service"
      mock_relying_party_ui.REDIRECT_URI: "https://healthservices.${domain_name}/userprofile"
      mock_relying_party_ui.REDIRECT_URI_REGISTRATION: "https://healthservices.${domain_name}/registration"
      mock_relying_party_ui.SIGN_IN_BUTTON_PLUGIN_URL: "https://esignet.${domain_name}/plugins/sign-in-button-plugin.js"
      istio.hosts[0]: "healthservices.${domain_name}"
    wait: true
    timeout: 480
    priority: -6
    hooks:
      preInstall: "$WORKDIR/hooks/mock-relying-party-ui-preinstall.sh"

  esignet-resident-oidc-partner-onboarder:
    namespace: esignet
    enabled: true
    version: 12.0.1
    chart: mosip/partner-onboarder
    set:
      # Module Configuration
      # S3 Configuration - UPDATE THESE VALUES FOR YOUR ENVIRONMENT
      onboarding.configmaps.s3.s3-host: "http://minio.minio:9000"
      onboarding.configmaps.s3.s3-user-key: "admin"
      onboarding.configmaps.s3.s3-region: ""
      onboarding.configmaps.s3.s3-bucket-name: "onboarder"
      onboarding.modules[0].name: "ida"
      onboarding.modules[0].enabled: "false"
      onboarding.modules[1].name: "print"
      onboarding.modules[1].enabled: "false"
      onboarding.modules[2].name: "abis"
      onboarding.modules[2].enabled: "false"
      onboarding.modules[3].name: "resident"
      onboarding.modules[3].enabled: "false"
      onboarding.modules[4].name: "mobileid"
      onboarding.modules[4].enabled: "false"
      onboarding.modules[5].name: "digitalcard"
      onboarding.modules[5].enabled: "false"
      onboarding.modules[6].name: "esignet"
      onboarding.modules[6].enabled: "true"
      onboarding.modules[7].name: "resident-oidc"
      onboarding.modules[7].enabled: "true"
      onboarding.modules[8].name: "demo-oidc"
      onboarding.modules[8].enabled: "false"
      onboarding.modules[9].name: "mimoto-keybinding"
      onboarding.modules[9].enabled: "false"
      # Set to true if you don't have public domain & valid SSL (development only)
      #onboarding.configmaps.onboarding.ENABLE_INSECURE: "false"
    wait: true
    waitForJobs: true
    timeout: 240
    priority: -5
    hooks:
      preInstall: "$WORKDIR/hooks/esignet-partner-onboarder-preinstall.sh"
      preUpgrade: "$WORKDIR/hooks/esignet-partner-onboarder-preinstall.sh"
      postInstall: "$WORKDIR/hooks/esignet-partner-onboarder-postinstall.sh"
      postUpgrade: "$WORKDIR/hooks/esignet-partner-onboarder-postinstall.sh"

  esignet-demo-oidc-partner-onboarder:
    namespace: esignet
    enabled: true
    version: 12.0.1
    chart: mosip/partner-onboarder
    set:
      # Module Configuration - Only demo-oidc enabled
      onboarding.modules[0].name: "ida"
      onboarding.modules[0].enabled: "false"
      onboarding.modules[1].name: "print"
      onboarding.modules[1].enabled: "false"
      onboarding.modules[2].name: "abis"
      onboarding.modules[2].enabled: "false"
      onboarding.modules[3].name: "resident"
      onboarding.modules[3].enabled: "false"
      onboarding.modules[4].name: "mobileid"
      onboarding.modules[4].enabled: "false"
      onboarding.modules[5].name: "digitalcard"
      onboarding.modules[5].enabled: "false"
      onboarding.modules[6].name: "esignet"
      onboarding.modules[6].enabled: "false"
      onboarding.modules[7].name: "resident-oidc"
      onboarding.modules[7].enabled: "false"
      onboarding.modules[8].name: "demo-oidc"
      onboarding.modules[8].enabled: "true"
      onboarding.modules[9].name: "mimoto-keybinding"
      onboarding.modules[9].enabled: "false"
      # S3 Configuration - UPDATE THESE VALUES FOR YOUR ENVIRONMENT
      onboarding.configmaps.s3.s3-host: "http://minio.minio:9000"
      onboarding.configmaps.s3.s3-user-key: "admin"
      onboarding.configmaps.s3.s3-region: ""
      onboarding.configmaps.s3.s3-bucket-name: "onboarder"
      # Set to true if you don't have public domain & valid SSL (development only)
      #onboarding.configmaps.onboarding.ENABLE_INSECURE: "false"
    wait: true
    waitForJobs: true
    timeout: 240
    priority: -4
    hooks:
      preInstall: "$WORKDIR/hooks/esignet-demo-oidc-partner-onboarder-preinstall.sh"
      preUpgrade: "$WORKDIR/hooks/esignet-demo-oidc-partner-onboarder-preinstall.sh"
      postInstall: "$WORKDIR/hooks/esignet-demo-oidc-partner-onboarder-postinstall.sh"
      postUpgrade: "$WORKDIR/hooks/esignet-demo-oidc-partner-onboarder-postinstall.sh"
