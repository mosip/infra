    hooks:
      preInstall: "$WORKDIR/hooks/esignet-standalone/mock-relying-party-service-mosipid1-preinstall.sh"

  mock-relying-party-service-mosipid2:
    namespace: esignet-mosipid2
    enabled: true
    version: 0.0.1-develop
    chart: mosip/mock-relying-party-service
    set:
      mock_relying_party_service.ESIGNET_SERVICE_URL: "http://esignet-mosipid2.esignet-mosipid2/v1/esignet"
      mock_relying_party_service.ESIGNET_AUD_URL: "https://esignet-mosipid2.${domain_name}/v1/esignet/oauth/v2/token"
      enable_insecure: "false"
      domainConfig.MOSIP_API_INTERNAL_HOST: "api-internal.${domain_name}"
    timeout: 480
    priority: -10
    hooks:
      preInstall: "$WORKDIR/hooks/esignet-standalone/mock-relying-party-service-mosipid2-preinstall.sh"

  mock-relying-party-service-sunbird:
