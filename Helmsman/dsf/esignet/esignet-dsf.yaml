    namespace: esignet-mock
    enabled: true
    version: 0.0.1-develop
    chart: mosip/oidc-ui
    set:
      image.repository: "mosipqa/oidc-ui"
      image.tag: "1.8.x"    
      istio.hosts[0]: "esignet.${domain_name}"
      oidc_ui.oidc_service_host: "esignet-mock.esignet-mock"
      oidc_ui.configmaps.oidc-ui.REACT_APP_API_BASE_URL: "http://esignet-mock.esignet-mock/v1/esignet"
      oidc_ui.configmaps.oidc-ui.REACT_APP_SBI_DOMAIN_URI: "http://esignet-mock.esignet-mock"
    timeout: 1200
    priority: -13
    hooks:
      preInstall: "$WORKDIR/hooks/esignet-standalone/oidc-ui-preinstall.sh"

  oidc-ui-mosipid1:
    namespace: esignet-mosipid1
    enabled: true
    version: 0.1.0-develop
    chart: mosip/oidc-ui
    set:
      image.repository: "mosipqa/oidc-ui"
      image.tag: "1.8.x"
      istio.hosts[0]: "esignet-mosipid1.${domain_name}"
      oidc_ui.oidc_service_host: "esignet-mosipid1.esignet-mosipid1"
      oidc_ui.configmaps.oidc-ui.REACT_APP_API_BASE_URL: "http://esignet-mosipid1.esignet-mosipid1/v1/esignet"
      oidc_ui.configmaps.oidc-ui.REACT_APP_SBI_DOMAIN_URI: "http://esignet-mosipid1.esignet-mosipid1"
    timeout: 1200
    priority: -13
    hooks:
      preInstall: "$WORKDIR/hooks/esignet-standalone/oidc-ui-mosipid1-preinstall.sh"

  oidc-ui-mosipid2:
    namespace: esignet-mosipid2
    enabled: true
    version: 0.0.1-develop
    chart: mosip/oidc-ui
    set:
      image.repository: "mosipqa/oidc-ui"
      image.tag: "1.8.x"
      istio.hosts[0]: "esignet-mosipid2.${domain_name}"
      oidc_ui.oidc_service_host: "esignet-mosipid2.esignet-mosipid2"
      oidc_ui.configmaps.oidc-ui.REACT_APP_API_BASE_URL: "http://esignet-mosipid2.esignet-mosipid2/v1/esignet"
      oidc_ui.configmaps.oidc-ui.REACT_APP_SBI_DOMAIN_URI: "http://esignet-mosipid2.esignet-mosipid2"
    timeout: 1200
    priority: -13
    hooks:
      preInstall: "$WORKDIR/hooks/esignet-standalone/oidc-ui-mosipid2-preinstall.sh"

  oidc-ui-sunbird:
    namespace: esignet-sunbird
    enabled: true
    version: 0.0.1-develop
    chart: mosip/oidc-ui
    set:
      image.repository: "mosipqa/oidc-ui"
      image.tag: "1.8.x"
      istio.hosts[0]: "esignet-sunbird.${domain_name}"
      oidc_ui.oidc_service_host: "esignet-sunbird.esignet-sunbird"
      oidc_ui.configmaps.oidc-ui.REACT_APP_API_BASE_URL: "http://esignet-sunbird.esignet-sunbird/v1/esignet"
      oidc_ui.configmaps.oidc-ui.REACT_APP_SBI_DOMAIN_URI: "http://esignet-sunbird.esignet-sunbird"
    timeout: 1200
    priority: -13
    hooks:
      preInstall: "$WORKDIR/hooks/esignet-standalone/oidc-ui-sunbird-preinstall.sh"

  # ---------------------------------------------------------------------------
  # Mock Identity System (Optional)
  # ---------------------------------------------------------------------------
  # Enable for testing with mock identity data.
  softhsm-mock-identity-system:
    namespace: softhsm
    enabled: true
    version: 12.0.1
    chart: mosip/softhsm
    valuesFile: "$WORKDIR/utils/softhsm-mock-identity-system-values.yaml"
    wait: true
    timeout: 480
    priority: -12
    hooks:
      preInstall: "$WORKDIR/hooks/esignet-standalone/softhsm-mock-identity-system-preinstall.sh"
      postInstall: "$WORKDIR/hooks/esignet-standalone/softhsm-mock-identity-system-postinstall.sh"

  mock-identity-system:
    namespace: esignet-mock
    enabled: true
    version: 0.0.1-develop
    chart: mosip/mock-identity-system
    set:
      enable_insecure: "false"
      extraEnvVarsCM[0]: "esignet-softhsm-share"
      extraEnvVarsCM[1]: "softhsm-mock-identity-system-share"
      domainConfig.MOSIP_ESIGNET_HOST: "esignet.${domain_name}"
      domainConfig.MOSIP_API_INTERNAL_HOST: "api-internal.${domain_name}"
      domainConfig.MOSIP_MOCK_IDA_IDENTITY_SCHEMA_URL: "https://raw.githubusercontent.com/prathmeshj12/addidentityschema_testing/refs/heads/main/email-signup-schema-testing.json"
      domainConfig.MOSIP_MOCK_UI_SPEC_SCHEMA_URL: "https://raw.githubusercontent.com/prathmeshj12/addidentityschema_testing/refs/heads/main/ui_spec_reset_password_phone.json"
    timeout: 480
    priority: -11
    hooks:
      preInstall: "$WORKDIR/hooks/esignet-standalone/mock-identity-system-preinstall.sh"

