    enabled: true
    version: 0.0.1-develop
    chart: mosip/mock-relying-party-ui
    set:
      mock_relying_party_ui.mock_relying_party_ui_service_host: "healthservices.${domain_name}"
      mock_relying_party_ui.ESIGNET_UI_BASE_URL: "https://esignet.${domain_name}"
      mock_relying_party_ui.MOCK_RELYING_PARTY_SERVER_URL: "https://healthservices.${domain_name}/mock-relying-party-service"
      mock_relying_party_ui.REDIRECT_URI: "https://healthservices.${domain_name}/userprofile"
      mock_relying_party_ui.REDIRECT_URI_REGISTRATION: "https://healthservices.${domain_name}/registration"
      mock_relying_party_ui.SIGN_IN_BUTTON_PLUGIN_URL: "https://esignet.${domain_name}/plugins/sign-in-button-plugin.js"
      istio.hosts[0]: "healthservices.${domain_name}"
    wait: true
    timeout: 480
    priority: -9
    hooks:
      preInstall: "$WORKDIR/hooks/esignet-standalone/mock-relying-party-ui-preinstall.sh"

  mock-relying-party-ui-mosipid1:
    namespace: esignet-mosipid1
    enabled: true
    version: 0.0.1-develop
    chart: mosip/mock-relying-party-ui
    set:
      mock_relying_party_ui.mock_relying_party_ui_service_host: "healthservices-mosipid1.${domain_name}"
      mock_relying_party_ui.ESIGNET_UI_BASE_URL: "https://esignet-mosipid1.${domain_name}"
      mock_relying_party_ui.MOCK_RELYING_PARTY_SERVER_URL: "https://healthservices-mosipid1.${domain_name}/mock-relying-party-service"
      mock_relying_party_ui.REDIRECT_URI: "https://healthservices-mosipid1.${domain_name}/userprofile"
      mock_relying_party_ui.REDIRECT_URI_REGISTRATION: "https://healthservices-mosipid1.${domain_name}/registration"
      mock_relying_party_ui.SIGN_IN_BUTTON_PLUGIN_URL: "https://esignet-mosipid1.${domain_name}/plugins/sign-in-button-plugin.js"
      istio.hosts[0]: "healthservices-mosipid1.${domain_name}"
    wait: true
    timeout: 480
    priority: -9
    hooks:
      preInstall: "$WORKDIR/hooks/esignet-standalone/mock-relying-party-ui-mosipid1-preinstall.sh"

  mock-relying-party-ui-mosipid2:
    namespace: esignet-mosipid2
    enabled: true
    version: 0.0.1-develop
    chart: mosip/mock-relying-party-ui
    set:
