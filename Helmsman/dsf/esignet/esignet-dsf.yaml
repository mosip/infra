      domainConfig.MOSIP_IAM_EXTERNAL_HOST: "iam.${domain_name}"
      domainConfig.MOSIP_API_INTERNAL_HOST: "api-internal.${domain_name}"
      domainConfig.MOSIP_KAFKA_HOST: "kafka.${domain_name}"
      domainConfig.MOSIP_POSTGRES_HOST: "postgres.${domain_name}"
      domainConfig.MOSIP_SMTP_HOST: "smtp.${domain_name}"
      domainConfig.installation-domain: "${domain_name}"
      domainConfig.MOSIP_ESIGNET_SUNBIRD_RC_REGISTRY_GET_URL: "https://registry.${sunbird_domain_name}"
      domainConfig.MOSIP_ESIGNET_AUTHENTICATOR_SUNBIRD_RC_AUTH_FACTOR_KBI_REGISTRY_SEARCH_URL: "https://registry.${sunbird_domain_name}/api/v1/Insurance/search"
      domainConfig.MOSIP_ESIGNET_AUTHENTICATOR_SUNBIRD_RC_REGISTRY_GET_URL: "https://registry.${sunbird_domain_name}/api/v1/Insurance/"
    timeout: 600
    priority: -14
    hooks:
      preInstall: "$WORKDIR/hooks/esignet-standalone/esignet-sunbird-preinstall.sh"

  # ---------------------------------------------------------------------------
  # OIDC UI v1.7.1
