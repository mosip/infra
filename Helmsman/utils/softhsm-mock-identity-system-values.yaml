# SoftHSM values for mock-identity-system
# This file contains the configuration for softhsm-mock-identity-system deployment

replicaCount: 1

image:
  repository: mosipid/softhsm
  tag: v2
  pullPolicy: Always

persistence:
  enabled: true
  size: 1Gi
  storageClass: ""

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
