[defaults]
# Note: host key verification is handled via StrictHostKeyChecking=accept-new in ssh_args;
# do not set host_key_checking = False as that silently disables all verification.
# Required: controls when facts are gathered by the playbook
gathering = explicit
# Required: collections installed to /tmp/ansible_collections must be discoverable
collections_paths = /tmp/ansible_collections
# Required: ansible-galaxy collection install fails on GPG verification in CI environments
galaxy_disable_gpg_verify = true

# Optional: output formatting — uncomment for verbose debug output
# stdout_callback = debug
# stderr_callback = debug

# Optional: fact caching — uncomment to cache facts across plays for performance
# fact_caching = memory
# fact_caching_timeout = 86400

# Optional: connection timeouts — uncomment to override Ansible defaults
# timeout = 30
# command_timeout = 30
# connect_timeout = 30
# gathering_timeout = 30

[ssh_connection]
# Required: significantly improves performance by reusing SSH connections
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o UserKnownHostsFile=/tmp/ansible_known_hosts -o StrictHostKeyChecking=accept-new
retries = 3
